<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundana · Sistema de Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
/* ========== DESIGN TOKENS — Mundana brand palette ========== */
:root {
  /* Brand colors from identity manual p.07 */
  --carvao: #252829;
  --grafite: #383a37;
  --oliva: #5c7161;
  --musgo: #6f8473;
  --menta: #93a597;
  --algodao: #ece4d9;
  --baunilha: #dacdbd;
  --areia: #c7baae;
  --sol-ancestral: #be9c60;
  --luz: #caab78;
  --rosa-antigo: #b17a7f;
  --rose: #cca2a6;
  --espuma: #e1c2c3;
  --violeta-suave: #998ea2;
  --lavanda: #b2aec3;
  --lua: #d8d6dd;

  /* Derived */
  --rose-pale: #f5e8e9;
  --oliva-pale: #e8efe9;
  --lavanda-pale: #edeaf2;
  --sol-pale: #f5eed8;

  /* Layout */
  --bg: #f8f5f1;
  --bg-warm: #f3ede6;
  --surface: #ffffff;
  --sidebar-bg: #000000;
  --sidebar-hover: #141414;
  --sidebar-active: var(--grafite);
  --sidebar-text: #8a8a8a;
  --sidebar-text-active: #ffffff;
  --text-primary: #252829;
  --text-secondary: #5a5550;
  --text-muted: #9a9490;
  --border: #e8e2da;
  --border-light: #f0ebe4;

  --shadow-sm: 0 2px 8px rgba(37,40,41,0.04);
  --shadow-md: 0 4px 16px rgba(37,40,41,0.06);
  --shadow-lg: 0 8px 32px rgba(37,40,41,0.08);
  --shadow-card: 0 2px 12px rgba(37,40,41,0.03);

  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 24px;
  --radius-full: 50px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  --transition-spring: 0.35s cubic-bezier(0.34,1.56,0.64,1);
  --sidebar-w: 250px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  font-size: 13.5px;
  line-height: 1.6;
  overflow: hidden;
  height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ========== LAYOUT ========== */
.app { display: flex; height: 100vh; }

/* ========== SIDEBAR ========== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  z-index: 10;
  border-radius: 0 var(--radius-xl) var(--radius-xl) 0;
}

.sidebar-brand {
  padding: 28px 24px 28px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-brand h1 {
  font-size: 22px;
  letter-spacing: 3px;
  color: var(--espuma);
  font-weight: 300;
  text-transform: lowercase;
}
.sidebar-brand span {
  display: block;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.3);
  margin-top: 3px;
  font-weight: 500;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 12px;
}
.sidebar-nav::-webkit-scrollbar { width: 0; }

.nav-module { margin-bottom: 4px; }

.nav-module-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.8px;
  color: #ffffff;
  cursor: default;
  user-select: none;
}
.nav-module-header svg {
  width: 15px; height: 15px; opacity: 0.7;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 9px 14px 9px 26px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: rgba(255,255,255,0.7);
  transition: var(--transition);
  font-size: 13px;
  font-weight: 500;
  user-select: none;
  position: relative;
}
.nav-item:hover {
  background: var(--sidebar-hover);
  color: #ffffff;
}
.nav-item.active {
  background: rgba(204,162,166,0.1);
  color: var(--rose);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 20px;
  background: var(--rose);
  border-radius: 0 3px 3px 0;
}
.nav-item svg {
  width: 17px; height: 17px; flex-shrink: 0; opacity: 0.55;
}
.nav-item.active svg { opacity: 1; color: var(--rose); }

.sidebar-footer {
  padding: 18px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.sidebar-user { display: flex; align-items: center; gap: 10px; }
.sidebar-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--rosa-antigo), var(--lavanda));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: 700;
}
.sidebar-user-info .name { color: #ddd; font-size: 12px; font-weight: 600; }
.sidebar-user-info .role { color: #666; font-size: 10px; font-weight: 500; }

/* ========== MAIN ========== */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.content { flex: 1; overflow-y: auto; padding: 32px 36px; }
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Page header */
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
.page-header-left h2 { font-size: 24px; font-weight: 700; line-height: 1.2; color: var(--carvao); }
.page-header-left p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.page-header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

/* ========== BUTTONS ========== */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px; border-radius: var(--radius-full);
  border: none; cursor: pointer;
  font-family: 'Montserrat', sans-serif;
  font-size: 12.5px; font-weight: 600;
  transition: var(--transition); white-space: nowrap;
}
.btn svg { width: 15px; height: 15px; }
.btn-primary { background: var(--carvao); color: #fff; }
.btn-primary:hover { background: var(--grafite); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-secondary { background: var(--surface); color: var(--text-secondary); border: 1.5px solid var(--border); }
.btn-secondary:hover { background: var(--bg-warm); border-color: var(--rosa-antigo); }
.btn-ghost { background: transparent; color: var(--text-secondary); padding: 9px 12px; }
.btn-ghost:hover { background: rgba(0,0,0,0.04); }
.btn-sm { padding: 6px 14px; font-size: 11.5px; }
.btn-icon {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); border: 1.5px solid var(--border);
  background: var(--surface); cursor: pointer;
  transition: var(--transition); color: var(--text-muted);
}
.btn-icon:hover { background: var(--bg-warm); border-color: var(--rosa-antigo); color: var(--rosa-antigo); }
.btn-icon svg { width: 16px; height: 16px; }

/* ========== CARDS ========== */
.card {
  background: var(--surface); border: 1.5px solid var(--border-light);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-card); overflow: hidden;
}
.card-header { padding: 18px 22px; display: flex; align-items: center; justify-content: space-between; }
.card-header h3 { font-size: 14px; font-weight: 700; color: var(--carvao); }
.card-body { padding: 0 22px 22px; }

/* Stat cards — Mundana colors */
.stat-card {
  border-radius: var(--radius-lg); padding: 20px 22px;
  position: relative; overflow: hidden; transition: var(--transition);
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.stat-card .stat-icon {
  width: 38px; height: 38px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center; margin-bottom: 14px;
}
.stat-card .stat-icon svg { width: 18px; height: 18px; }
.stat-card .stat-value { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.stat-card .stat-label { font-size: 11px; font-weight: 600; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .stat-deco { position: absolute; right: -10px; top: -10px; width: 70px; height: 70px; border-radius: 50%; opacity: 0.1; }

.stat-rose { background: #e8a0a6; color: #5a1a20; }
.stat-rose .stat-icon { background: rgba(90,26,32,0.12); }
.stat-rose .stat-deco { background: #5a1a20; }

.stat-oliva { background: #7aab82; color: #1a3a1e; }
.stat-oliva .stat-icon { background: rgba(26,58,30,0.12); }
.stat-oliva .stat-deco { background: #1a3a1e; }

.stat-lavanda { background: #a68ec4; color: #2e1a4a; }
.stat-lavanda .stat-icon { background: rgba(46,26,74,0.12); }
.stat-lavanda .stat-deco { background: #2e1a4a; }

.stat-sol { background: #d4a94e; color: #4a3510; }
.stat-sol .stat-icon { background: rgba(74,53,16,0.12); }
.stat-sol .stat-deco { background: #4a3510; }

/* ========== FORMS ========== */
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 11px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.8px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-family: 'Montserrat', sans-serif; font-size: 13px;
  color: var(--text-primary); background: var(--surface);
  transition: var(--transition); outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--rosa-antigo); box-shadow: 0 0 0 3px rgba(177,122,127,0.1); }
.form-input::placeholder { color: var(--text-muted); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; gap: 14px; }
.form-row-2 { grid-template-columns: 1fr 1fr; }
.form-row-3 { grid-template-columns: 1fr 1fr 1fr; }

/* ========== TABLE ========== */
table { width: 100%; border-collapse: collapse; }
table th { text-align: left; padding: 12px 16px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 700; border-bottom: 1.5px solid var(--border); }
table td { padding: 13px 16px; border-bottom: 1px solid var(--border-light); font-size: 13px; vertical-align: middle; }
table tr { transition: var(--transition); }
table tr:hover td { background: var(--bg-warm); }

/* ========== BADGES ========== */
.badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: var(--radius-full); font-size: 11px; font-weight: 600; }
.badge-oliva { background: var(--oliva-pale); color: var(--oliva); }
.badge-rose { background: var(--rose-pale); color: var(--rosa-antigo); }
.badge-lavanda { background: var(--lavanda-pale); color: var(--violeta-suave); }

/* ========== MODAL ========== */
.modal-overlay { position: fixed; inset: 0; background: rgba(37,40,41,0.45); backdrop-filter: blur(6px); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal { background: var(--surface); border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); width: 92%; max-width: 640px; max-height: 85vh; overflow-y: auto; transform: translateY(12px) scale(0.98); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.modal-overlay.open .modal { transform: translateY(0) scale(1); }
.modal-wide { max-width: 900px; }
.modal-header { padding: 22px 26px 18px; display: flex; align-items: center; justify-content: space-between; }
.modal-header h2 { font-size: 17px; font-weight: 700; }
.modal-close { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border: none; background: var(--bg-warm); cursor: pointer; color: var(--text-muted); border-radius: 50%; transition: var(--transition); }
.modal-close:hover { background: var(--border); color: var(--text-primary); }
.modal-close svg { width: 16px; height: 16px; }
.modal-body { padding: 0 26px 22px; }
.modal-footer { padding: 16px 26px; border-top: 1.5px solid var(--border-light); display: flex; justify-content: flex-end; gap: 8px; }

/* ========== SEARCH ========== */
.search-box { position: relative; }
.search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--text-muted); }
.search-box input { padding-left: 34px; border-radius: var(--radius-full); background: var(--bg-warm); border-color: transparent; }
.search-box input:focus { background: var(--surface); border-color: var(--rosa-antigo); }

/* ========== GRID ========== */
.grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

/* ========== PRODUCT CARD ========== */
.product-card { background: var(--surface); border: 1.5px solid var(--border-light); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: var(--transition); }
.product-card:hover { box-shadow: var(--shadow-md); transform: translateY(-3px); border-color: var(--espuma); }
.product-card-img { height: 170px; background: linear-gradient(135deg, var(--algodao), var(--rose-pale)); display: flex; align-items: center; justify-content: center; color: var(--areia); position: relative; overflow: hidden; }
.product-card-img img { width: 100%; height: 100%; object-fit: cover; }
.product-card-img svg { width: 28px; height: 28px; opacity: 0.35; }
.product-card-body { padding: 16px 18px; }
.product-card-body .product-line { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 600; margin-bottom: 2px; }
.product-card-body h4 { font-size: 15px; font-weight: 700; margin-bottom: 4px; color: var(--carvao); }
.product-card-body .product-type { font-size: 12px; color: var(--text-muted); }
.product-card-body .product-price { font-size: 16px; font-weight: 800; color: var(--oliva); margin-top: 8px; }

/* ========== FOLDER CHIPS ========== */
.folder-bar { display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; }
.folder-chip { display: flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: var(--radius-full); cursor: pointer; transition: var(--transition); font-size: 12px; font-weight: 600; background: var(--surface); border: 1.5px solid var(--border); color: var(--text-secondary); }
.folder-chip:hover { border-color: var(--rosa-antigo); color: var(--text-primary); }
.folder-chip.active { background: var(--carvao); color: #fff; border-color: var(--carvao); }
.folder-chip .count { background: rgba(0,0,0,0.06); padding: 1px 7px; border-radius: 10px; font-size: 10px; }
.folder-chip.active .count { background: rgba(255,255,255,0.18); }

/* ========== CALENDAR ========== */
.cal-container { background: var(--surface); border: 1.5px solid var(--border-light); border-radius: var(--radius-lg); padding: 22px; box-shadow: var(--shadow-card); }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.cal-header h3 { font-size: 15px; font-weight: 700; color: var(--carvao); }
.cal-nav { display: flex; gap: 4px; }
.cal-nav button { width: 30px; height: 30px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: var(--transition); }
.cal-nav button:hover { background: var(--bg-warm); border-color: var(--rosa-antigo); }
.cal-nav button svg { width: 15px; height: 15px; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; text-align: center; }
.cal-day-name { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 6px 0; font-weight: 700; }
.cal-day { padding: 8px 4px; font-size: 13px; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); font-weight: 500; }
.cal-day:hover { background: var(--bg-warm); }
.cal-day.today { background: var(--carvao); color: #fff; font-weight: 700; }
.cal-day.other-month { color: var(--text-muted); opacity: 0.3; }
.cal-day.has-event::after { content: ''; display: block; margin: 2px auto 0; width: 4px; height: 4px; border-radius: 50%; background: var(--rosa-antigo); }

/* ========== ACTIVITY ========== */
.activity-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: var(--radius-sm); transition: var(--transition); margin-bottom: 2px; }
.activity-item:hover { background: var(--bg-warm); }
.activity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.activity-text { font-size: 13px; flex: 1; }
.activity-time { font-size: 11px; color: var(--text-muted); font-weight: 500; }

/* ========== INGREDIENT ROW ========== */
.ingredient-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 8px; align-items: center; margin-bottom: 6px; }
.ingredient-row input { padding: 8px 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 12.5px; font-family: 'Montserrat', sans-serif; outline: none; transition: var(--transition); width: 100%; }
.ingredient-row input:focus { border-color: var(--rosa-antigo); }
.remove-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; color: var(--text-muted); border-radius: 50%; transition: var(--transition); }
.remove-btn:hover { background: var(--rose-pale); color: var(--rosa-antigo); }
.remove-btn svg { width: 14px; height: 14px; }

/* ========== PRODUCTION ========== */
.prod-info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.prod-info-card { background: var(--bg-warm); border-radius: var(--radius-md); padding: 18px; text-align: center; }
.prod-info-card label { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; }
.prod-info-card .value { font-size: 24px; font-weight: 800; color: var(--carvao); }
.production-step { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border-light); }
.production-step:last-child { border-bottom: none; }
.step-check { width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 7px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition-spring); margin-top: 1px; }
.step-check:hover { border-color: var(--oliva); }
.step-check.checked { background: var(--oliva); border-color: var(--oliva); color: #fff; }
.step-check svg { display: none; width: 13px; height: 13px; }
.step-check.checked svg { display: block; }
.step-content { flex: 1; }
.step-content .step-num { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 2px; }
.step-content.done .step-text { text-decoration: line-through; color: var(--text-muted); }
.progress-bar { width: 100%; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 12px 0; }
.progress-fill { height: 100%; background: var(--oliva); border-radius: 3px; transition: width 0.5s ease; }

.calc-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border-light); align-items: center; font-size: 13px; }
.calc-row:last-child { border-bottom: none; }
.calc-row .qty { text-align: right; font-weight: 700; color: var(--oliva); }
.calc-row .pct { text-align: center; color: var(--text-muted); }

.lot-result { background: var(--oliva-pale); border: 1.5px solid var(--oliva); border-radius: var(--radius-xl); padding: 32px; text-align: center; }
.lot-result .lot-number { font-size: 30px; font-weight: 800; color: var(--oliva); }
.lot-result .lot-dates { display: flex; justify-content: center; gap: 32px; margin-top: 12px; font-size: 13px; color: var(--musgo); }

/* Formula select */
.formula-select-card { background: var(--surface); border: 1.5px solid var(--border-light); border-radius: var(--radius-lg); padding: 22px; cursor: pointer; transition: var(--transition); position: relative; overflow: hidden; }
.formula-select-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, var(--rosa-antigo), var(--lavanda)); opacity: 0; transition: var(--transition); }
.formula-select-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--espuma); }
.formula-select-card:hover::before { opacity: 1; }
.formula-select-card h4 { font-size: 15px; font-weight: 700; margin-bottom: 4px; color: var(--carvao); }
.formula-select-card .sub { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }

/* Empty */
.empty-state { text-align: center; padding: 70px 20px; }
.empty-state .empty-icon { width: 60px; height: 60px; margin: 0 auto 18px; border-radius: 50%; background: var(--bg-warm); display: flex; align-items: center; justify-content: center; }
.empty-state .empty-icon svg { width: 26px; height: 26px; color: var(--areia); }
.empty-state h3 { font-size: 16px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; }
.empty-state p { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }

/* View toggle */
.view-toggle { display: flex; border: 1.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.view-toggle button { padding: 6px 10px; border: none; background: var(--surface); cursor: pointer; color: var(--text-muted); transition: var(--transition); display: flex; align-items: center; justify-content: center; }
.view-toggle button.active { background: var(--carvao); color: #fff; }
.view-toggle button svg { width: 14px; height: 14px; }

/* Photo */
.photo-upload { width: 100%; height: 100px; border: 2px dashed var(--border); border-radius: var(--radius-md); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); color: var(--text-muted); font-size: 12px; position: relative; overflow: hidden; background: var(--bg-warm); }
.photo-upload:hover { border-color: var(--rosa-antigo); background: var(--rose-pale); }
.photo-upload img { max-width: 100%; max-height: 100%; object-fit: contain; }
.photo-upload svg { width: 22px; height: 22px; margin-bottom: 6px; opacity: 0.4; }
.photo-upload input { display: none; }

/* Toast */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--carvao); color: #fff; padding: 13px 22px; border-radius: var(--radius-full); font-size: 13px; font-weight: 500; box-shadow: var(--shadow-lg); animation: toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes toastIn { from { opacity: 0; transform: translateY(10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.anim { animation: fadeUp 0.35s ease forwards; }
.d1 { animation-delay: 0.04s; opacity: 0; }
.d2 { animation-delay: 0.08s; opacity: 0; }
.d3 { animation-delay: 0.12s; opacity: 0; }
.d4 { animation-delay: 0.16s; opacity: 0; }

/* TOP BAR */
.top-bar {
  display: flex; align-items: center; justify-content: flex-end;
  padding: 12px 36px 0; gap: 10px; flex-shrink: 0;
}
.alert-btn {
  position: relative; width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; border: 1.5px solid var(--border);
  background: var(--surface); cursor: pointer;
  transition: var(--transition); color: var(--text-muted);
}
.alert-btn:hover { background: var(--bg-warm); border-color: var(--rosa-antigo); color: var(--rosa-antigo); }
.alert-btn svg { width: 18px; height: 18px; }
.alert-btn .alert-badge {
  position: absolute; top: -2px; right: -2px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--rosa-antigo); color: #fff;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--bg);
}
.alert-panel {
  position: absolute; top: 46px; right: 0;
  width: 340px; background: var(--surface);
  border: 1.5px solid var(--border-light);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); z-index: 50;
  max-height: 400px; overflow-y: auto;
  display: none;
}
.alert-panel.open { display: block; }
.alert-panel-header {
  padding: 14px 18px; border-bottom: 1px solid var(--border-light);
  font-size: 13px; font-weight: 700; color: var(--carvao);
}
.alert-item {
  display: flex; gap: 10px; padding: 12px 18px;
  border-bottom: 1px solid var(--border-light);
  font-size: 12px; align-items: flex-start;
}
.alert-item:last-child { border-bottom: none; }
.alert-item .alert-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0; margin-top: 4px;
}
.alert-item .alert-text { flex: 1; color: var(--text-secondary); line-height: 1.5; }
.alert-item .alert-text strong { color: var(--carvao); }

/* USER CARD (Empresa) */
.empresa-card {
  background: var(--surface); border: 1.5px solid var(--border-light);
  border-radius: var(--radius-lg); padding: 28px;
  box-shadow: var(--shadow-card);
}
.empresa-logo {
  width: 80px; height: 80px; border-radius: var(--radius-md);
  background: var(--bg-warm); display: flex; align-items: center; justify-content: center;
  overflow: hidden; cursor: pointer; transition: var(--transition);
  border: 2px dashed var(--border); position: relative;
}
.empresa-logo:hover { border-color: var(--rosa-antigo); }
.empresa-logo img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
.empresa-logo svg { width: 28px; height: 28px; color: var(--areia); }
.empresa-logo input { display: none; }

/* Tab bar reusable */
.tab-bar {
  display: flex; gap: 2px; border-bottom: 1.5px solid var(--border); margin-bottom: 22px;
}
.tab-item {
  padding: 9px 18px; font-size: 13px; cursor: pointer;

}
.tab-item.active { font-weight: 700; color: var(--rosa-antigo); border-bottom-color: var(--rosa-antigo); }
.tab-item:hover { color: var(--text-secondary); }

/* User role badges */

.role-viewer { background: var(--oliva-pale); color: var(--oliva); }

// Simple tables that store as name-only arrays
const SIMPLE_ARRAY_TABLES=['product_types','pag_types','idea_types'];

// Supabase REST helper
async function sbFetch(path,opts={}){
  const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'return=minimal',...(opts.headers||{})},
    method:opts.method||'GET',
    body:opts.body?JSON.stringify(opts.body):undefined
  });
  if(opts.method==='GET'||opts.prefer==='return=representation'){
    try{return await res.json();}catch{return[];}
  }
  return res.ok;
}

// ========== DB (localStorage cache + Supabase sync) ==========
const DB={
  _mem:{},
  get(k){try{const v=localStorage.getItem('mundana_'+k);if(v)return JSON.parse(v);return DB._mem[k]||[];}catch{return DB._mem[k]||[];}},
  set(k,d){
    DB._mem[k]=d;
    try{localStorage.setItem('mundana_'+k,JSON.stringify(d));}
    catch(e){console.warn('localStorage full for',k,', using memory + Supabase');}
    DB._syncToSupabase(k,d);
  },
  async _syncToSupabase(k,data){
    try{
      const map=TABLE_MAP[k];
      if(map){
        if(map.isJsonStore){
          // Store entire array as JSON in app_data
          await sbFetch('app_data?key=eq.'+k,{method:'DELETE'});
          await sbFetch('app_data',{method:'POST',body:{key:k,value:data}});
        } else {
          // Full table sync: delete all, then upsert
          await sbFetch(map.table+'?id=neq.___never___',{method:'DELETE'});
          if(data.length>0){
            const rows=map.toRow?data.map(map.toRow):data;
            await sbFetch(map.table,{method:'POST',body:rows});
          }
        }
      } else if(SIMPLE_ARRAY_TABLES.includes(k)){
        // Name-only arrays stored in their table
        await sbFetch(k+'?id=gt.0',{method:'DELETE'});
        if(data.length>0){
          await sbFetch(k,{method:'POST',body:data.map(n=>({name:n}))});
        }
      } else {
        // Everything else goes to app_data as JSON
        await sbFetch('app_data?key=eq.'+k,{method:'DELETE'});
        await sbFetch('app_data',{method:'POST',body:{key:k,value:data}});
      }
    }catch(e){console.warn('Sync error:',k,e);}
  }
};

// ========== INITIAL LOAD FROM SUPABASE ==========
async function loadFromSupabase(){
  try{
    // Load mapped tables — only if local is empty
    for(const[k,map] of Object.entries(TABLE_MAP)){
      const local=DB.get(k);
      if(local&&local.length>0)continue; // Already have local data, skip
      if(map.isJsonStore){
        const rows=await sbFetch('app_data?key=eq.'+k+'&select=value');
        if(rows&&Array.isArray(rows)&&rows[0]&&rows[0].value&&rows[0].value.length>0){
          DB._mem[k]=rows[0].value;
          try{localStorage.setItem('mundana_'+k,JSON.stringify(rows[0].value));}catch(e){}
        }
      } else {
        const rows=await sbFetch(map.table+'?select=*');
        if(rows&&Array.isArray(rows)&&rows.length>0){
          const data=map.fromRow?rows.map(map.fromRow):rows;
          DB._mem[k]=data;
          try{localStorage.setItem('mundana_'+k,JSON.stringify(data));}catch(e){}
        }
      }
    }
    // Load simple array tables — only if local is empty
    for(const k of SIMPLE_ARRAY_TABLES){
      const local=DB.get(k);
      if(local&&local.length>0)continue;
      const rows=await sbFetch(k+'?select=name');
      if(rows&&Array.isArray(rows)&&rows.length>0){
        const data=rows.map(r=>r.name);
        DB._mem[k]=data;
        try{localStorage.setItem('mundana_'+k,JSON.stringify(data));}catch(e){}
      }
    }
    // Load app_data entries — only if local is empty
    const appRows=await sbFetch('app_data?select=key,value');
    if(appRows&&Array.isArray(appRows)){
      appRows.forEach(r=>{
        if(!TABLE_MAP[r.key]){
          const local=DB.get(r.key);
          if(local&&((Array.isArray(local)&&local.length>0)||(!Array.isArray(local)&&local)))return;
          DB._mem[r.key]=r.value;
          try{localStorage.setItem('mundana_'+r.key,JSON.stringify(r.value));}catch(e){}
        }
      });
    }
    // Special: empresa data
    const localEmp=localStorage.getItem('mundana_empresa');
    if(!localEmp||localEmp==='{}' ||localEmp==='null'){
      const empRow=await sbFetch('app_data?key=eq.empresa&select=value');
      if(empRow&&empRow[0]&&empRow[0].value){
        DB._mem['empresa']=empRow[0].value;
        try{localStorage.setItem('mundana_empresa',JSON.stringify(empRow[0].value));}catch(e){}
      }
    }
    // Special: pricing_lines
    const localPl=localStorage.getItem('mundana_pricing_lines');
    if(!localPl||localPl==='{}' ||localPl==='null'){
      const plRow=await sbFetch('app_data?key=eq.pricing_lines&select=value');
      if(plRow&&plRow[0]&&plRow[0].value){
        DB._mem['pricing_lines']=plRow[0].value;
        try{localStorage.setItem('mundana_pricing_lines',JSON.stringify(plRow[0].value));}catch(e){}
      }
    }
    // Special: alerts_read
    const localAr=localStorage.getItem('mundana_alerts_read');
    if(!localAr||localAr==='[]'||localAr==='null'){
      const arRow=await sbFetch('app_data?key=eq.alerts_read&select=value');
      if(arRow&&arRow[0]&&arRow[0].value){
        DB._mem['alerts_read']=arRow[0].value;
        try{localStorage.setItem('mundana_alerts_read',JSON.stringify(arRow[0].value));}catch(e){}
      }
    }
  }catch(e){console.warn('Load from Supabase failed, using local cache:',e);}
  // Re-render after load
  renderNav();render();
}

function renderWhatIf(mode,cfg,forms){

      const newCard=newPrice*cfg.cardRate;
      const newProfit=newPrice-c.costTotalUnit-newTax-newCard;
      const newMargin=newPrice>0?newProfit/newPrice:0;
      const diffProfit=newProfit-c.profit;
      return {name:f.name,curPrice,newPrice,curMargin:c.marginReal,newMargin,curProfit:c.profit,newProfit,diffProfit,units:c.unitsLot};
    }).filter(r=>r.curPrice>0);
    const totalDiffLot=rows.reduce((s,r)=>s+r.diffProfit*r.units,0);
    return `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">

        <span id="wifPctVal" style="font-size:14px;font-weight:700;min-width:44px;color:${pct>=0?'var(--oliva)':'var(--rosa-antigo)'}">${pct}%</span>

        <td style="font-weight:600">${r.name}</td>
        <td style="text-align:center">${fmtR(r.curPrice)}</td>

        <td style="text-align:center;font-weight:700;color:${r.diffProfit>=0?'var(--oliva)':'var(--rosa-antigo)'}">${r.diffProfit>=0?'+':''}${fmtR(r.diffProfit)}</td>
      </tr>`).join('')}</tbody></table></div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light);font-size:12px;display:flex;justify-content:space-between">
        <span style="color:var(--text-muted)">Impacto total por lote:</span>
        <strong style="color:${totalDiffLot>=0?'var(--oliva)':'var(--rosa-antigo)'}">${totalDiffLot>=0?'+':''}${fmtR(totalDiffLot)}</strong>

  }
  if(mode==='cost'){
    const extra=S._wifExtraCost||0;
    const curFixed=cfg.fixedCosts;
    const newFixed=curFixed+extra;
    const rows=forms.map(f=>{
      const c=calcFormula(f);
      const newFixedUnit=cfg.totalUnitsMonth>0?newFixed/cfg.totalUnitsMonth:0;
      const newCostUnit=c.costVarUnit+newFixedUnit;
      const newPriceSug=newCostUnit/(1-cfg.taxRate-cfg.cardRate-cfg.marginTarget);

      return {name:f.name,curCost:c.costTotalUnit,newCost:newCostUnit,curPrice:curPriceSug,newPrice:newPriceSug,diff:newPriceSug-curPriceSug};

      const newPriceSug=c.costTotalUnit/(1-newTax/100-newCard/100-cfg.marginTarget);
      const curTaxVal=curPriceSug*cfg.taxRate;
      const newTaxVal=newPriceSug*newTax/100;
      const curCardVal=curPriceSug*cfg.cardRate;
      const newCardVal=newPriceSug*newCard/100;
      const newProfit=newPriceSug-c.costTotalUnit-newTaxVal-newCardVal;
      return {name:f.name,curPrice:curPriceSug,newPrice:newPriceSug,diff:newPriceSug-curPriceSug,newProfit};
    }).filter(r=>r.curPrice>0);
    return `
      <div style="display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:12px;color:var(--text-secondary)">Impostos:</span>
          <input class="form-input" type="number" step="0.5" min="0" max="50" value="${newTax}" oninput="S._wifTax=parseFloat(this.value)||0;document.getElementById('wifContent').innerHTML=renderWhatIf('tax',getCfg(),DB.get('formulas'))" style="width:70px;font-size:13px;font-weight:700">
          <span style="font-size:12px;color:var(--text-muted)">%</span>

function rDash(){
  const prods=DB.get('products'),forms=DB.get('formulas'),lots=DB.get('lots'),pagar=DB.get('pagar');
  const today=new Date(),todayStr=localDateStr(today);
  const y=S.calY,m=S.calM,fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),dip=new Date(y,m,0).getDate();
  let cal='';
  for(let i=fd-1;i>=0;i--)cal+=`<div class="cal-day other-month">${dip-i}</div>`;
  for(let d=1;d<=dim;d++){
    const dt=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    const hasLot=lots.some(l=>l.date===dt);
    const hasPag=pagar.some(p=>p.vencimento===dt&&p.status!=='pago');
    const hasPagPaid=pagar.some(p=>p.vencimento===dt&&p.status==='pago');
    let dots='';
    if(hasPag) dots+=`<span style="width:5px;height:5px;border-radius:50%;background:var(--rosa-antigo)"></span>`;
    if(hasPagPaid) dots+=`<span style="width:5px;height:5px;border-radius:50%;background:var(--oliva)"></span>`;
    if(hasLot) dots+=`<span style="width:5px;height:5px;border-radius:50%;background:var(--lavanda)"></span>`;
    cal+=`<div class="cal-day ${isT?'today':''}" style="position:relative">${d}${dots?`<div style="display:flex;gap:2px;justify-content:center;margin-top:2px">${dots}</div>`:''}</div>`;
  }
  const rem=(7-(fd+dim)%7)%7;
  for(let i=1;i<=rem;i++)cal+=`<div class="cal-day other-month">${i}</div>`;
  const hr=today.getHours();
  const gr=hr<12?'Bom dia':hr<18?'Boa tarde':'Boa noite';

  document.getElementById('content').innerHTML=`
    <div class="page-header anim">
      <div class="page-header-left">
        <h2>${gr}, Ana</h2>
        <p>Resumo do dia — ${today.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}</p>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;margin-bottom:26px">
      <div class="stat-card stat-rose anim d1"><div class="stat-deco"></div><div class="stat-icon">${I.box}</div><div class="stat-value">${prods.length}</div><div class="stat-label">Produtos</div></div>
      <div class="stat-card stat-oliva anim d2"><div class="stat-deco"></div><div class="stat-icon">${I.beaker}</div><div class="stat-value">${forms.length}</div><div class="stat-label">Fórmulas</div></div>
      <div class="stat-card stat-lavanda anim d3"><div class="stat-deco"></div><div class="stat-icon">${I.archive}</div><div class="stat-value">${lots.length}</div><div class="stat-label">Lotes</div></div>
      <div class="stat-card stat-sol anim d4"><div class="stat-deco"></div><div class="stat-icon">${I.clock}</div><div class="stat-value">${lots.filter(l=>l.status==='em_estoque').length}</div><div class="stat-label">Em estoque</div></div>
    </div>
    ${ (()=>{
      const receber=DB.get('receber'), pagar=DB.get('pagar');
      const totalRec=receber.reduce((s,i)=>s+(parseFloat(i.valor)||0),0);
      const recebido=receber.filter(i=>i.status==='recebido').reduce((s,i)=>s+(parseFloat(i.valor)||0),0);
      const totalPag=pagar.reduce((s,i)=>s+(parseFloat(i.valor)||0),0);
      const pago=pagar.filter(i=>i.status==='pago').reduce((s,i)=>s+(parseFloat(i.valor)||0),0);
      const pagHoje=pagar.filter(p=>p.vencimento===todayStr&&p.status!=='pago');

// ========== IMAGE COMPRESSION ==========
function compressImage(dataUrl,maxW,quality,cb){
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');
    let w=img.width,h=img.height;
    if(w>maxW){h=h*(maxW/w);w=maxW;}
    c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',quality));
  };
  img.src=dataUrl;
}

function handlePh(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{
  const raw=ev.target.result;
  if(f.type.startsWith('image/')){
    compressImage(raw,400,0.7,compressed=>{
      tmpPhoto=compressed;
      document.getElementById('phPrev').innerHTML=`<img src="${tmpPhoto}"><input type="file" id="phIn" accept="image/*" onchange="handlePh(event)">`;
    });
  } else { tmpPhoto=raw; document.getElementById('phPrev').innerHTML=`<img src="${tmpPhoto}"><input type="file" id="phIn" accept="image/*" onchange="handlePh(event)">`; }
};r.readAsDataURL(f);}
function saveProd(id){const prods=DB.get('products');const d={id:id||uid(),name:document.getElementById('pN').value,line:document.getElementById('pL').value,type:document.getElementById('pT').value,ml:document.getElementById('pMl').value,price:document.getElementById('pP').value,notes:document.getElementById('pNo').value,description:document.getElementById('pD').value,folder:document.getElementById('pF').value,photo:tmpPhoto};if(!d.name){toast('Preencha o nome do produto');return;}if(id){const i=prods.findIndex(p=>p.id===id);if(i>=0)prods[i]=d;}else prods.push(d);DB.set('products',prods);tmpPhoto='';closeModal();rProds();toast(id?'Produto atualizado':'Produto cadastrado');}
function delProd(id){if(!confirm('Excluir este produto?'))return;DB.set('products',DB.get('products').filter(p=>p.id!==id));rProds();toast('Produto excluído');}
function openFolderModal(){const folders=DB.get('product_folders');openModal('Gerenciar Pastas',`<div id="fList">${folders.map(f=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><input class="form-input" value="${f.name}" onchange="updFolder('${f.id}',this.value)" style="flex:1"><button class="remove-btn" onclick="delFolder('${f.id}')">${I.trash}</button></div>`).join('')}</div><div style="display:flex;gap:8px;margin-top:14px"><input class="form-input" id="nfN" placeholder="Nome da nova pasta" style="flex:1"><button class="btn btn-primary btn-sm" onclick="addFolder()">Criar</button></div>`,'<button class="btn btn-secondary" onclick="closeModal()">Fechar</button>');}

function calcFormula(f){
  const cfg=getCfg();
  const lotSize=parseFloat(f.lotSize)||0;
  const unitSize=parseFloat(f.unitSize)||0;
  const unitsLot=unitSize>0?Math.floor(lotSize/unitSize):0;
  const unitsProdMonth=parseFloat(f.unitsProdMonth)||30;
  const lossRate=cfg.lossRate;
  const packagingCost=parseFloat(f.packagingCost)||0;
  const otherCosts=parseFloat(f.otherCosts)||0;

  const totalMP=(f.ingredients||[]).reduce((s,i)=>s+(parseFloat(i.totalCost)||0),0);
  const laborLot=0;
  const packagingLot=packagingCost*unitsLot;
  const otherLot=otherCosts*unitsLot;
  const subtotalVar=totalMP+laborLot+packagingLot+otherLot;
  const adjustedLot=lossRate<1?subtotalVar/(1-lossRate):subtotalVar;
  const costVarUnit=unitsLot>0?adjustedLot/unitsLot:0;
  const fixedPerUnit=cfg.totalUnitsMonth>0?cfg.fixedCosts/cfg.totalUnitsMonth:0;
  const costTotalUnit=costVarUnit+fixedPerUnit;

  const priceMin=costTotalUnit/(1-cfg.taxRate-cfg.cardRate);
  const priceSuggested=costTotalUnit/(1-cfg.taxRate-cfg.cardRate-cfg.marginTarget);
  const taxVal=priceSuggested*cfg.taxRate;
  const cardVal=priceSuggested*cfg.cardRate;
  const profit=priceSuggested-costTotalUnit-taxVal-cardVal;
  const marginReal=priceSuggested>0?profit/priceSuggested:0;
  const profitLot=profit*unitsLot;

  return {totalMP,laborLot,packagingLot,otherLot,subtotalVar,adjustedLot,costVarUnit,fixedPerUnit,costTotalUnit,priceMin,priceSuggested,taxVal,cardVal,profit,marginReal,profitLot,unitsLot};
}

function searchIngMP(idx,q){
  const drop=document.getElementById('ingDrop'+idx);
  if(!q||q.length<1){drop.style.display='none';return;}
  const stock=DB.get('stockmp');
  const unique={};stock.forEach(s=>{if(s.name) unique[s.name]={unit:s.unit||'',price:s.price||'',qty:s.quantity||''};});
  const matches=Object.keys(unique).filter(n=>n.toLowerCase().includes(q.toLowerCase()));
  if(matches.length===0){drop.style.display='none';return;}
  drop.style.display='block';
  drop.innerHTML=matches.slice(0,6).map(n=>{
    const info=unique[n];
    return `<div style="padding:6px 10px;cursor:pointer;font-size:12px;display:flex;justify-content:space-between;transition:background 0.15s" onmouseover="this.style.background='var(--bg-warm)'" onmouseout="this.style.background=''" onclick="pickIngMP(${idx},'${n.replace(/'/g,"\\'")}','${(info.unit||'').replace(/'/g,"\\'")}')"><span>${n}</span><span style="color:var(--text-muted)">${info.unit||''}</span></div>`;
  }).join('');
}
function pickIngMP(idx,name,unit){
  window._fIng[idx].name=name;
  window._fIng[idx].unit=unit;
  document.getElementById('ingN'+idx).value=name;
  const uEl=document.getElementById('ingU'+idx);if(uEl)uEl.value=unit;
  document.getElementById('ingDrop'+idx).style.display='none';
}

function calcIngCost(i){

function rProdExec(){
  const forms=DB.get('formulas'),f=forms.find(x=>x.id===S.prodFId);if(!f){S.prodFId=null;rProd();return;}
  const q=S.prodQty,steps=f.prepSteps?f.prepSteps.split('\n').filter(s=>s.trim()):[];
  if(S.prodSteps.length!==steps.length)S.prodSteps=steps.map(()=>false);
  const done=S.prodSteps.filter(Boolean).length,pct=steps.length>0?(done/steps.length)*100:0,allDone=steps.length>0&&done===steps.length&&q>0;
  const lotSize=parseFloat(f.lotSize)||1;
  const ratio=q>0?q/lotSize:0;
  document.getElementById('content').innerHTML=`
    <div class="page-header anim"><div class="page-header-left"><h2>${f.name}</h2><p>${f.productType||'Produção em andamento'}</p></div><div class="page-header-actions"><button class="btn btn-secondary" onclick="S.prodFId=null;rProd()">${I.back} Voltar</button></div></div>
    <div class="prod-info-grid anim d1"><div class="prod-info-card"><label>Tamanho do lote (g)</label><input class="form-input" type="number" value="${q||''}" placeholder="${f.lotSize||'Ex: 3000'}" onchange="S.prodQty=parseFloat(this.value)||0;rProdExec()" style="text-align:center;font-size:20px;font-weight:800;max-width:180px;margin:4px auto 0;border:none;background:transparent"></div><div class="prod-info-card"><label>Ingredientes</label><div class="value">${(f.ingredients||[]).length}</div></div><div class="prod-info-card"><label>Progresso</label><div class="value" style="color:${pct===100?'var(--oliva)':'var(--carvao)'}">${Math.round(pct)}%</div></div></div>
    ${q>0?`<div class="card anim d2" style="margin-bottom:18px"><div class="card-header"><h3>Ingredientes para ${q}g ${ratio!==1?`(fator ${ratio.toFixed(2)}x)`:''}</h3></div><div class="card-body"><div class="calc-row" style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:700;border-bottom:1.5px solid var(--border)"><span>Ingrediente</span><span class="pct">Unidade</span><span class="qty">Quantidade</span></div>${(f.ingredients||[]).map(ing=>{const base=parseFloat(ing.qtyLot)||0;const amt=base*ratio;return`<div class="calc-row"><span>${ing.name}</span><span class="pct">${ing.unit||'-'}</span><span class="qty">${amt.toFixed(2)}</span></div>`;}).join('')}</div></div>`:''}
    ${steps.length>0?`<div class="card anim d3" style="margin-bottom:18px"><div class="card-header"><h3>Modo de preparo</h3><span style="font-size:12px;color:var(--text-muted);font-weight:600">${done} de ${steps.length}</span></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>${steps.map((s,i)=>`<div class="production-step"><div class="step-check ${S.prodSteps[i]?'checked':''}" onclick="S.prodSteps[${i}]=!S.prodSteps[${i}];rProdExec()">${I.check}</div><div class="step-content ${S.prodSteps[i]?'done':''}"><div class="step-num">Passo ${i+1}</div><div class="step-text">${s}</div></div></div>`).join('')}</div></div>`:''}
    ${allDone?`<div style="text-align:center;padding:18px" class="anim d4"><button class="btn btn-primary" onclick="finishProd()" style="font-size:13.5px;padding:12px 32px">${I.check} Finalizar produção e gerar lote</button></div>`:''}`;
}
function finishProd(){
  const forms=DB.get('formulas'),f=forms.find(x=>x.id===S.prodFId);if(!f)return;
  const lots=DB.get('lots'),now=new Date();
  const num='LOT-'+now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'-'+String(lots.length+1).padStart(3,'0');
  const fab=localDateStr(now),val=new Date(now);val.setMonth(val.getMonth()+24);const valS=localDateStr(val);
  lots.push({id:uid(),lotNumber:num,formulaId:f.id,formulaName:f.name,line:f.line||'',quantity:S.prodQty,date:fab,validity:valS,status:'em_estoque'});DB.set('lots',lots);
  // Descontar MP do estoque
  const stock=DB.get('stockmp');
  const lotSize=parseFloat(f.lotSize)||1;
  const ratio=S.prodQty/lotSize;
  (f.ingredients||[]).forEach(ing=>{
    const ingName=(ing.name||'').toLowerCase().trim();
    const consumed=(parseFloat(ing.qtyLot)||0)*ratio;
    if(!ingName||consumed<=0)return;
    // Find matching stock item and deduct
    const match=stock.find(s=>(s.name||'').toLowerCase().trim()===ingName);
    if(match){
      match.quantity=String(Math.max(0,(parseFloat(match.quantity)||0)-consumed).toFixed(2));
    }
  });
  DB.set('stockmp',stock);
  // Entrada no estoque de produto acabado
  const c=calcFormula(f);
  const unitsProduced=c.unitsLot>0?Math.round(c.unitsLot*ratio):0;
  const pa=DB.get('stockpa');
  pa.push({id:uid(),name:f.name,productType:f.productType||'',line:f.line||'',lotNumber:num,quantity:unitsProduced,fabricacao:fab,validade:valS,formulaId:f.id,status:'disponivel'});
  DB.set('stockpa',pa);
  document.getElementById('content').innerHTML=`<div style="max-width:500px;margin:60px auto;text-align:center" class="anim">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--oliva-pale);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;color:var(--oliva)">${I.check}</div>
    <h2 style="font-size:24px;font-weight:800;margin-bottom:6px;color:var(--carvao)">Produção finalizada</h2>
    <p style="color:var(--text-muted);margin-bottom:28px">Lote registrado com sucesso no sistema</p>
    <div class="lot-result">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--musgo);font-weight:700;margin-bottom:4px">Número do Lote</div>
      <div class="lot-number">${num}</div>
      <div class="lot-dates"><div><strong>Fabricação:</strong> ${fmtD(fab)}</div><div><strong>Validade:</strong> ${fmtD(valS)}</div></div>
      <div style="margin-top:12px;font-size:14px;color:var(--oliva)"><strong>${f.name}</strong> — ${S.prodQty}g — ${unitsProduced} unidade${unitsProduced!==1?'s':''}</div>
    </div>
    <div style="margin-top:28px;display:flex;gap:12px;justify-content:center">
      <button class="btn btn-secondary" onclick="S.prodFId=null;rProd()">Nova produção</button>
      <button class="btn btn-primary" onclick="go('dashboard')">Ir para Dashboard</button>
    </div>
  </div>`;
  toast('Lote '+num+' registrado');
}

function rStockMP(){

function renderStockMP(){

  return items.length===0?`<div class="empty-state"><div class="empty-icon">${I.stock}</div><h3>Nenhuma matéria-prima registrada</h3><p>Registre suas compras de insumos</p><button class="btn btn-primary" onclick="openStockModal()">${I.plus} Nova Entrada</button></div>`:`
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-bottom:14px"><div class="search-box">${I.search}<input class="form-input" placeholder="Buscar..." oninput="filterStock(this.value)" style="width:180px"></div><button class="btn btn-primary" onclick="openStockModal()">${I.plus} Nova Entrada</button></div>
    <div class="card"><div class="table-wrapper"><table id="stockTable"><thead><tr><th>Matéria-prima</th><th>Fornecedor</th><th>Data Compra</th><th>Quantidade</th><th>Valor (R$)</th><th>Link</th><th></th></tr></thead><tbody>${items.map(i=>`<tr><td><strong>${i.name}</strong></td><td>${i.supplier||'-'}</td><td>${fmtD(i.purchaseDate)}</td><td>${i.quantity||'-'} ${i.unit||''}</td><td>${fmtR(i.price)}</td><td>${i.supplierLink?`<a href="${i.supplierLink}" target="_blank" style="color:var(--rosa-antigo)">${I.link}</a>`:'-'}</td><td style="text-align:right"><button class="btn-icon" onclick="openStockModal('${i.id}')" style="display:inline-flex">${I.edit}</button><button class="btn-icon" onclick="delStock('${i.id}')" style="display:inline-flex;margin-left:4px">${I.trash}</button></td></tr>`).join('')}</tbody></table></div></div>`;

function renderStockPA(){
  const items=DB.get('stockpa');
  const totalUnits=items.reduce((s,i)=>s+(parseInt(i.quantity)||0),0);
  const now=new Date();
  return items.length===0?`<div class="empty-state"><div class="empty-icon">${I.box}</div><h3>Nenhum produto acabado em estoque</h3><p>Finalize uma produção no Modo Produção para gerar entradas aqui</p><button class="btn btn-primary" onclick="go('production')">${I.production} Ir para Produção</button></div>`:`
    <div style="display:flex;gap:12px;margin-bottom:18px">
      <div style="background:var(--oliva-pale);border-radius:var(--radius-md);padding:14px 20px;flex:1;text-align:center"><div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--oliva);font-weight:700;margin-bottom:2px">Total em Estoque</div><div style="font-size:22px;font-weight:800;color:var(--oliva)">${totalUnits} un</div></div>
      <div style="background:var(--lavanda-pale);border-radius:var(--radius-md);padding:14px 20px;flex:1;text-align:center"><div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--violeta-suave);font-weight:700;margin-bottom:2px">Lotes Registrados</div><div style="font-size:22px;font-weight:800;color:var(--violeta-suave)">${items.length}</div></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-bottom:14px"><div class="search-box">${I.search}<input class="form-input" placeholder="Buscar..." oninput="filterStockPA(this.value)" style="width:180px"></div></div>
    <div class="card"><div class="table-wrapper"><table id="stockPATable"><thead><tr><th>Produto</th><th>Linha</th><th>Tipo</th><th>Lote</th><th>Quantidade</th><th>Fabricação</th><th>Validade</th><th>Status</th><th></th></tr></thead><tbody>${items.map(i=>{const valDate=new Date(i.validade);const daysToExp=Math.ceil((valDate-now)/(1000*60*60*24));const isNearExp=daysToExp<=90&&daysToExp>0;const isExpired=daysToExp<=0;const statusLabel=i.status==='disponivel'?'Disponível':i.status==='reservado'?'Reservado':i.status==='vendido'?'Vendido':i.status||'Disponível';const statusBadge=i.status==='vendido'?'badge-oliva':i.status==='reservado'?'badge-lavanda':'badge-oliva';return`<tr><td><strong>${i.name}</strong></td><td>${i.line||'-'}</td><td><span class="badge badge-oliva">${i.productType||'-'}</span></td><td style="font-family:monospace;font-size:12px">${i.lotNumber||'-'}</td><td><strong>${i.quantity||0} un</strong></td><td>${fmtD(i.fabricacao)}</td><td>${isExpired?`<span style="color:var(--rosa-antigo);font-weight:600">${fmtD(i.validade)} (vencido)</span>`:isNearExp?`<span style="color:var(--sol-ancestral);font-weight:600">${fmtD(i.validade)} (${daysToExp}d)</span>`:fmtD(i.validade)}</td><td><span class="badge ${statusBadge}" style="cursor:pointer" onclick="cycleStatusPA('${i.id}')">${statusLabel}</span></td><td style="text-align:right"><button class="btn-icon" onclick="editStockPA('${i.id}')" style="display:inline-flex">${I.edit}</button><button class="btn-icon" onclick="delStockPA('${i.id}')" style="display:inline-flex;margin-left:4px">${I.trash}</button></td></tr>`;}).join('')}</tbody></table></div></div>`;
}
function filterStockPA(q){const lq=q.toLowerCase();document.querySelectorAll('#stockPATable tbody tr').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(lq)?'':'none';});}
function cycleStatusPA(id){const items=DB.get('stockpa');const i=items.find(x=>x.id===id);if(!i)return;const cycle=['disponivel','reservado','vendido'];const idx=cycle.indexOf(i.status||'disponivel');i.status=cycle[(idx+1)%cycle.length];DB.set('stockpa',items);rStockMP();toast('Status: '+(i.status==='disponivel'?'Disponível':i.status==='reservado'?'Reservado':'Vendido'));}
function editStockPA(id){const items=DB.get('stockpa');const i=items.find(x=>x.id===id);if(!i)return;openModal('Editar Produto Acabado',`
    <div class="form-row" style="grid-template-columns:1fr 1fr 1fr"><div class="form-group"><label class="form-label">Produto</label><input class="form-input" id="paN" value="${i.name}"></div><div class="form-group"><label class="form-label">Linha</label><select class="form-select" id="paLine" onchange="if(this.value==='_other'){const v=prompt('Nome da nova linha:');if(v){const o=document.createElement('option');o.value=v;o.text=v;this.add(o,this.options.length-1);this.value=v;}else this.value='';}">${[...new Set(DB.get('products').map(p=>p.line).filter(Boolean))].map(l=>`<option value="${l}" ${i.line===l?'selected':''}>${l}</option>`).join('')}<option value="_other">+ Nova linha</option></select></div><div class="form-group"><label class="form-label">Tipo</label><input class="form-input" id="paT" value="${i.productType||''}"></div></div>
    <div class="form-row" style="grid-template-columns:1fr 1fr 1fr 1fr"><div class="form-group"><label class="form-label">Lote</label><input class="form-input" id="paL" value="${i.lotNumber||''}" readonly style="opacity:0.6"></div><div class="form-group"><label class="form-label">Quantidade (un)</label><input class="form-input" id="paQ" type="number" value="${i.quantity||0}"></div><div class="form-group"><label class="form-label">Fabricação</label><input class="form-input" id="paF" type="date" value="${i.fabricacao||''}"></div><div class="form-group"><label class="form-label">Validade</label><input class="form-input" id="paV" type="date" value="${i.validade||''}"></div></div>
    <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="paS"><option value="disponivel" ${i.status==='disponivel'?'selected':''}>Disponível</option><option value="reservado" ${i.status==='reservado'?'selected':''}>Reservado</option><option value="vendido" ${i.status==='vendido'?'selected':''}>Vendido</option></select></div>
  `,`<button class="btn btn-ghost" style="color:var(--rosa-antigo)" onclick="delStockPA('${i.id}');closeModal()">Excluir</button><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveStockPA('${i.id}')">Salvar</button>`);}
function saveStockPA(id){const items=DB.get('stockpa');const idx=items.findIndex(x=>x.id===id);if(idx<0)return;items[idx].name=document.getElementById('paN').value;items[idx].line=(()=>{const v=document.getElementById('paLine').value;return v==='_other'?'':v;})();items[idx].productType=document.getElementById('paT').value;items[idx].quantity=parseInt(document.getElementById('paQ').value)||0;items[idx].fabricacao=document.getElementById('paF').value;items[idx].validade=document.getElementById('paV').value;items[idx].status=document.getElementById('paS').value;DB.set('stockpa',items);closeModal();rStockMP();toast('Produto atualizado');}
function delStockPA(id){if(!confirm('Excluir este item do estoque?'))return;DB.set('stockpa',DB.get('stockpa').filter(x=>x.id!==id));rStockMP();toast('Excluído');}
function filterStock(q){const lq=q.toLowerCase();document.querySelectorAll('#stockTable tbody tr').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(lq)?'':'none';});}
function openStockModal(id){
  const items=DB.get('stockmp');
  const s=id?items.find(x=>x.id===id):{id:'',name:'',supplier:'',purchaseDate:'',quantity:'',unit:'',price:'',supplierLink:''};

  openModal(id?'Editar Entrada':'Nova Entrada de MP',`

    <div class="form-row" style="grid-template-columns:1fr 1fr 1fr 1fr"><div class="form-group"><label class="form-label">Data da Compra</label><input class="form-input" id="sDate" type="date" value="${s.purchaseDate||''}"></div><div class="form-group"><label class="form-label">Quantidade</label><input class="form-input" id="sQty" type="number" step="0.1" value="${s.quantity||''}" placeholder="1000"></div><div class="form-group"><label class="form-label">Unidade</label><input class="form-input" id="sUnit" value="${s.unit||''}" placeholder="g, ml, un"></div><div class="form-group"><label class="form-label">Valor Total (R$)</label><input class="form-input" id="sPrice" type="number" step="0.01" value="${s.price||''}" placeholder="50.00"></div></div>
    <div class="form-group"><label class="form-label">Link do Fornecedor</label><input class="form-input" id="sLink" value="${s.supplierLink||''}" placeholder="https://..."></div>
  `,`${id?`<button class="btn btn-ghost" style="color:var(--rosa-antigo)" onclick="delStock('${s.id}');closeModal()">Excluir</button>`:''}<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveStock('${s.id||''}')">Salvar</button>`);
}
function saveStock(id){
  const items=DB.get('stockmp');
  let sup=document.getElementById('sSup').value;
  if(sup==='_other') sup=prompt('Nome do fornecedor:')||'';
  const d={id:id||uid(),name:document.getElementById('sN').value,supplier:sup,purchaseDate:document.getElementById('sDate').value,quantity:document.getElementById('sQty').value,unit:document.getElementById('sUnit').value,price:document.getElementById('sPrice').value,supplierLink:document.getElementById('sLink').value};
  if(!d.name){toast('Preencha o nome da MP');return;}
  if(id){const i=items.findIndex(x=>x.id===id);if(i>=0)items[i]=d;}else items.push(d);
  DB.set('stockmp',items);closeModal();rStockMP();toast(id?'Entrada atualizada':'Entrada registrada');
}
function delStock(id){if(!confirm('Excluir?'))return;DB.set('stockmp',DB.get('stockmp').filter(x=>x.id!==id));rStockMP();toast('Excluído');}

function renderPricingResumo(){
  const forms=DB.get('formulas');
  if(forms.length===0) return '<div class="empty-state"><div class="empty-icon">'+I.dollar+'</div><h3>Sem dados</h3><p>Cadastre fórmulas para ver o resumo de preços</p></div>';
  const cfg=getCfg();
  const pricingLines=getPricingLines(); // {formulaId: lineName}
  const products=DB.get('products');
  // Extract unique lines from products
  const lines=[...new Set(products.map(p=>p.line).filter(Boolean))];

  const rows=forms.map(f=>{
    const c=calcFormula(f);
    const currentLine=pricingLines[f.id]||'';
    return `<tr>
      <td><select class="form-select" onchange="setPricingLine('${f.id}',this.value)" style="padding:6px 8px;font-size:12px;min-width:130px;border-radius:6px">
        <option value="">— Selecionar —</option>
        ${lines.map(l=>`<option value="${l}" ${currentLine===l?'selected':''}>${l}</option>`).join('')}
        <option value="_custom" ${currentLine&&!lines.includes(currentLine)?'selected':''}>Outra...</option>
      </select>${currentLine&&!lines.includes(currentLine)?`<div style="font-size:11px;color:var(--text-muted);margin-top:2px">${currentLine}</div>`:''}</td>
      <td><strong>${f.name}</strong></td>
      <td>${c.unitsLot}</td>
      <td>${fmtR(c.costVarUnit)}</td>
      <td>${fmtR(c.fixedPerUnit)}</td>
      <td>${fmtR(c.costTotalUnit)}</td>
      <td><strong>${fmtR(c.priceSuggested)}</strong></td>
      <td>${fmtR(c.taxVal)}</td>
      <td>${fmtR(c.cardVal)}</td>
      <td style="color:var(--oliva);font-weight:700">${fmtR(c.profit)}</td>
    </tr>`;
  }).join('');
  return `<div class="card"><div class="card-header"><h3>Resumo — Precificação dos Produtos</h3></div><div class="card-body"><p style="font-size:12px;color:var(--text-muted);margin-bottom:14px">Impostos: ${(cfg.taxRate*100).toFixed(1)}% | Taxa cartão: ${(cfg.cardRate*100).toFixed(1)}% | Margem alvo: ${(cfg.marginTarget*100).toFixed(0)}% | Custos fixos: ${fmtR(cfg.fixedCosts)}/mês</p><div class="table-wrapper"><table><thead><tr><th>Linha</th><th>Fórmula</th><th>Un/Lote</th><th>C. Variável</th><th>Rateio Fixo</th><th>C. Total</th><th>Preço Sug.</th><th>Impostos</th><th>Tx Cartão</th><th>Lucro</th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`;
}

function setPricingLine(formulaId,val){
  if(val==='_custom'){
    const custom=prompt('Digite o nome da linha:');
    if(!custom){rPricing();return;}
    val=custom;
  }
  const lines=getPricingLines();
  lines[formulaId]=val;
  _origSetPricingLines(lines);
  rPricing();
}

// ========== TOP BAR — ALERTS ==========
function getAlerts(){
  const alerts=[];
  const today=new Date();const todayStr=localDateStr(today);
  // Lotes produzidos hoje
  const lots=DB.get('lots').filter(l=>l.date===todayStr);
  lots.forEach(l=>alerts.push({key:'lot_'+l.id,type:'oliva',text:`Lote <strong>${l.lotNumber}</strong> produzido hoje — ${l.formulaName}`}));
  // Estoque MP baixo — calcula consumo total de cada MP nas fórmulas
  const stock=DB.get('stockmp');
  const formulas=DB.get('formulas');
  const consumoMap={};
  formulas.forEach(f=>{
    (f.ingredients||[]).forEach(ing=>{
      const name=(ing.name||'').toLowerCase().trim();
      if(!name)return;
      consumoMap[name]=(consumoMap[name]||0)+(parseFloat(ing.qtyLot)||0);
    });
  });
  stock.forEach(s=>{
    const name=(s.name||'').toLowerCase().trim();
    const qtdEstoque=parseFloat(s.quantity)||0;
    const consumo=consumoMap[name]||0;
    if(consumo>0 && qtdEstoque<=(consumo*0.3)){
      const pct=consumo>0?Math.round((qtdEstoque/consumo)*100):0;
      alerts.push({key:'stock_'+s.id,type:'rosa-antigo',text:`Estoque baixo: <strong>${s.name}</strong> — ${qtdEstoque} ${s.unit||''} (${pct}% do necessário por lote)`});
    }
  });
  if(formulas.length===0) alerts.push({key:'no_formulas',type:'sol-ancestral',text:'Nenhuma fórmula cadastrada ainda'});
  if(DB.get('products').length===0) alerts.push({key:'no_products',type:'sol-ancestral',text:'Nenhum produto cadastrado ainda'});
  const pagar=DB.get('pagar').filter(p=>p.vencimento===todayStr&&p.status!=='pago');
  pagar.forEach(p=>alerts.push({key:'pag_'+p.id,type:'sol-ancestral',text:`Pagamento hoje: <strong>${p.descricao}</strong> — ${fmtR(p.valor)}`}));
  const vencidos=DB.get('pagar').filter(p=>p.vencimento<todayStr&&p.status!=='pago');
  if(vencidos.length>0) alerts.push({key:'pag_vencidos_'+todayStr,type:'rosa-antigo',text:`<strong>${vencidos.length}</strong> pagamento${vencidos.length>1?'s':''} vencido${vencidos.length>1?'s':''}`});
  return alerts;
}

function getReadAlerts(){
  try{return JSON.parse(localStorage.getItem('mundana_alerts_read'))||{};}catch{return{};}
}
function markAlertRead(key){
  const read=getReadAlerts();
  read[key]=Date.now();
  _origSetAlertsRead(read);
  renderTopBar();
}
function clearReadAlerts(){
  _origSetAlertsRead({});
  renderTopBar();
}

function renderTopBar(){
  const allAlerts=getAlerts();
  const read=getReadAlerts();
  const unread=allAlerts.filter(a=>!read[a.key]);
  const readList=allAlerts.filter(a=>read[a.key]);
  const count=unread.length;
  document.getElementById('topBar').innerHTML=`
    <div style="position:relative">
      <div class="alert-btn" onclick="S.alertOpen=!S.alertOpen;renderTopBar()">
        ${I.bell}
        ${count>0?`<div class="alert-badge">${count>9?'9+':count}</div>`:''}
      </div>
      <div class="alert-panel ${S.alertOpen?'open':''}">
        <div class="alert-panel-header" style="display:flex;align-items:center;justify-content:space-between">
          <span>Alertas (${count})</span>
          ${unread.length>0?`<span style="font-size:11px;color:var(--rosa-antigo);cursor:pointer;font-weight:500" onclick="markAllAlertsRead()">Marcar todas como lidas</span>`:''}
        </div>
        ${unread.length===0&&readList.length===0?'<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px">Nenhum alerta no momento</div>':''}
        ${unread.map(a=>`
          <div class="alert-item" style="background:var(--surface)">
            <div class="alert-dot" style="background:var(--${a.type})"></div>
            <div class="alert-text">${a.text}</div>
            <div class="remove-btn" onclick="event.stopPropagation();markAlertRead('${a.key}')" title="Marcar como lida" style="flex-shrink:0">${I.check}</div>
          </div>
        `).join('')}
        ${readList.length>0?`
          <div style="padding:8px 18px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:700;border-top:1px solid var(--border-light)">Lidas</div>
          ${readList.map(a=>`
            <div class="alert-item" style="opacity:0.5">
              <div class="alert-dot" style="background:var(--${a.type})"></div>
              <div class="alert-text">${a.text}</div>
            </div>
          `).join('')}
        `:''}
      </div>
    </div>
  `;
}

function markAllAlertsRead(){
  const allAlerts=getAlerts();
  const read=getReadAlerts();
  allAlerts.forEach(a=>{read[a.key]=Date.now();});
  _origSetAlertsRead(read);
  renderTopBar();
}

// Close alert panel on outside click
document.addEventListener('click',e=>{

function renderEmpresaDocs(){

}
function openEmpDocModal(){
  openModal('Anexar Documento',`
    <div class="form-group"><label class="form-label">Nome do Documento</label><input class="form-input" id="edN" placeholder="Ex: Contrato Social"></div>
    <div class="form-group"><label class="form-label">Tipo</label><input class="form-input" id="edT" placeholder="Ex: Contrato, Alvará, Certificado"></div>
    <div class="form-group"><label class="form-label">Arquivo</label><div class="photo-upload" onclick="document.getElementById('edFile').click()" id="edPrev" style="height:80px">${I.file}<span>Clique para selecionar</span><input type="file" id="edFile" onchange="handleEmpDoc(event)"></div></div>
  `,`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveEmpDoc()">Salvar</button>`);
}
let _empDocData='',_empDocFileName='';
function handleEmpDoc(e){const f=e.target.files[0];if(!f)return;_empDocFileName=f.name;const r=new FileReader();r.onload=ev=>{_empDocData=ev.target.result;document.getElementById('edPrev').innerHTML=`<span style="font-size:12px">${I.file} ${f.name}</span><input type="file" id="edFile" onchange="handleEmpDoc(event)">`};r.readAsDataURL(f);}
function saveEmpDoc(){
  const name=document.getElementById('edN').value;if(!name||!_empDocData){toast('Preencha nome e anexe arquivo');return;}
  const docs=DB.get('empresa_docs');
  docs.push({id:uid(),name,tipo:document.getElementById('edT').value,date:localDateStr(),data:_empDocData,fileName:_empDocFileName});
  DB.set('empresa_docs',docs);_empDocData='';_empDocFileName='';closeModal();rEmpresa();toast('Documento anexado');
}
function delEmpDoc(id){if(!confirm('Excluir documento?'))return;DB.set('empresa_docs',DB.get('empresa_docs').filter(d=>d.id!==id));rEmpresa();toast('Documento excluído');}

// ========== FINANCEIRO — A RECEBER ==========
function rReceber(){
  const items=DB.get('receber');
  const total=items.reduce((s,i)=>s+(parseFloat(i.valor)||0),0);
  const received=items.filter(i=>i.status==='recebido').reduce((s,i)=>s+(parseFloat(i.valor)||0),0);
  document.getElementById('content').innerHTML=`
    <div class="page-header anim"><div class="page-header-left"><h2>A Receber</h2><p>${items.length} entrada${items.length!==1?'s':''} — Total: ${fmtR(total)} | Recebido: ${fmtR(received)}</p></div><div class="page-header-actions"><button class="btn btn-primary" onclick="openReceberModal()">${I.plus} Nova Entrada</button></div></div>
    ${items.length===0?`<div class="empty-state anim d1"><div class="empty-icon">${I.arrowIn}</div><h3>Nenhuma entrada registrada</h3><p>Cadastre seus recebimentos</p><button class="btn btn-primary" onclick="openReceberModal()">${I.plus} Nova Entrada</button></div>`:`
    <div class="card anim d1"><div class="table-wrapper"><table><thead><tr><th>Descrição</th><th>Cliente</th><th>Vencimento</th><th>Valor</th><th>Status</th><th></th></tr></thead><tbody>${items.map(i=>`<tr><td><strong>${i.descricao}</strong></td><td>${i.cliente||'-'}</td><td>${fmtD(i.vencimento)}</td><td><strong>${fmtR(i.valor)}</strong></td><td><span class="badge ${i.status==='recebido'?'badge-oliva':'badge-rose'}" style="cursor:pointer" onclick="toggleReceber('${i.id}')">${i.status==='recebido'?'Recebido':'Pendente'}</span></td><td style="text-align:right"><button class="btn-icon" onclick="openReceberModal('${i.id}')" style="display:inline-flex">${I.edit}</button><button class="btn-icon" onclick="delReceber('${i.id}')" style="display:inline-flex;margin-left:4px">${I.trash}</button></td></tr>`).join('')}</tbody></table></div></div>`}`;
}
function openReceberModal(id){
  const items=DB.get('receber');
  const r=id?items.find(x=>x.id===id):{id:'',descricao:'',cliente:'',vencimento:'',valor:'',status:'pendente',obs:''};
  openModal(id?'Editar Entrada':'Nova Entrada',`
    <div class="form-group"><label class="form-label">Descrição</label><input class="form-input" id="rcDesc" value="${r.descricao}" placeholder="Ex: Venda lote Hidratante"></div>
    <div class="form-row form-row-3"><div class="form-group"><label class="form-label">Cliente</label><input class="form-input" id="rcCli" value="${r.cliente||''}" placeholder="Nome do cliente"></div><div class="form-group"><label class="form-label">Vencimento</label><input class="form-input" id="rcVenc" type="date" value="${r.vencimento||''}"></div><div class="form-group"><label class="form-label">Valor (R$)</label><input class="form-input" id="rcVal" type="number" step="0.01" value="${r.valor||''}" placeholder="0.00"></div></div>
    <div class="form-group"><label class="form-label">Observações</label><input class="form-input" id="rcObs" value="${r.obs||''}" placeholder="Opcional"></div>
  `,`${id?`<button class="btn btn-ghost" style="color:var(--rosa-antigo)" onclick="delReceber('${r.id}');closeModal()">Excluir</button>`:''}<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveReceber('${r.id||''}')">Salvar</button>`);
}
function saveReceber(id){
  const items=DB.get('receber');
  const d={id:id||uid(),descricao:document.getElementById('rcDesc').value,cliente:document.getElementById('rcCli').value,vencimento:document.getElementById('rcVenc').value,valor:document.getElementById('rcVal').value,obs:document.getElementById('rcObs').value,status:id?(items.find(x=>x.id===id)?.status||'pendente'):'pendente'};

  if(id){const i=items.findIndex(x=>x.id===id);if(i>=0)items[i]=d;}else items.push(d);
  DB.set('receber',items);closeModal();rReceber();toast(id?'Atualizado':'Cadastrado');
}
function toggleReceber(id){const items=DB.get('receber');const i=items.find(x=>x.id===id);if(i)i.status=i.status==='recebido'?'pendente':'recebido';DB.set('receber',items);rReceber();}
function delReceber(id){if(!confirm('Excluir?'))return;DB.set('receber',DB.get('receber').filter(x=>x.id!==id));rReceber();toast('Excluído');}

function rPagar(){
  const items=DB.get('pagar');
  const total=items.reduce((s,i)=>s+(parseFloat(i.valor)||0),0);
  const paid=items.filter(i=>i.status==='pago').reduce((s,i)=>s+(parseFloat(i.valor)||0),0);
  document.getElementById('content').innerHTML=`
    <div class="page-header anim"><div class="page-header-left"><h2>A Pagar</h2><p>${items.length} lançamento${items.length!==1?'s':''} — Total: ${fmtR(total)} | Pago: ${fmtR(paid)}</p></div><div class="page-header-actions"><button class="btn btn-secondary btn-sm" onclick="managePagTypes()">${I.edit} Tipos</button><button class="btn btn-primary" onclick="openPagarModal()">${I.plus} Novo Lançamento</button></div></div>
    ${items.length===0?`<div class="empty-state anim d1"><div class="empty-icon">${I.arrowOut}</div><h3>Nenhum lançamento registrado</h3><p>Cadastre seus pagamentos</p><button class="btn btn-primary" onclick="openPagarModal()">${I.plus} Novo Lançamento</button></div>`:`
    <div class="card anim d1"><div class="table-wrapper"><table><thead><tr><th>Descrição</th><th>Fornecedor</th><th>Tipo</th><th>Vencimento</th><th>Valor</th><th>Detalhes</th><th>Status</th><th></th></tr></thead><tbody>${items.map(i=>{
      let detalhes='À vista';
      if(i.parcelado==='sim') detalhes=(i.parcela||'1')+'/'+(i.totalParcelas||'1');
      if(i.recorrente&&i.recorrente!=='nao') detalhes=({mensal:'Mensal',semanal:'Semanal',personalizado:'Recorrente'})[i.recorrente]||detalhes;
      return `<tr><td><strong>${i.descricao}</strong></td><td>${i.fornecedor||'-'}</td><td><span class="badge badge-lavanda">${i.tipo||'-'}</span></td><td>${fmtD(i.vencimento)}</td><td><strong>${fmtR(i.valor)}</strong></td><td><span style="font-size:11px;color:var(--text-muted)">${detalhes}</span></td><td><span class="badge ${i.status==='pago'?'badge-oliva':'badge-rose'}" style="cursor:pointer" onclick="togglePagar('${i.id}')">${i.status==='pago'?'Pago':'Pendente'}</span></td><td style="text-align:right"><button class="btn-icon" onclick="openPagarModal('${i.id}')" style="display:inline-flex">${I.edit}</button><button class="btn-icon" onclick="delPagar('${i.id}')" style="display:inline-flex;margin-left:4px">${I.trash}</button></td></tr>`;
    }).join('')}</tbody></table></div></div>`}`;
}

      <div class="form-group" id="recorrDiasField" style="display:${p.recorrente==='personalizado'?'block':'none'}"><label class="form-label">A cada quantos dias?</label><input class="form-input" id="pgRecorrDias" type="number" value="${p.recorrDias||''}" placeholder="15"></div>
    </div>
    <div class="form-group"><label class="form-label">Observações</label><input class="form-input" id="pgObs" value="${p.obs||''}" placeholder="Opcional"></div>
  `,`${id?`<button class="btn btn-ghost" style="color:var(--rosa-antigo)" onclick="delPagar('${p.id}');closeModal()">Excluir</button>`:''}<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="savePagar('${p.id||''}')">Salvar</button>`);
  togglePagExtras();

  const calcParcVal=()=>{
    const total=parseFloat(document.getElementById('pgVal')?.value)||0;
    const n=parseInt(document.getElementById('pgParcT')?.value)||1;

    if(el&&document.getElementById('pgParc').value==='sim') el.textContent=fmtR(total/n)+' /parcela';
  };
  document.getElementById('pgVal')?.addEventListener('input',calcParcVal);
  document.getElementById('pgParcT')?.addEventListener('input',calcParcVal);
