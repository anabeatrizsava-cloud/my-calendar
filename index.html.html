function togglePagExtras(){
  const parc=document.getElementById('pgParc').value;
  const recorr=document.getElementById('pgRecorr').value;
  document.getElementById('parcFields').style.display=parc==='sim'?'grid':'none';
  document.getElementById('recorrDiasField').style.display=recorr==='personalizado'?'block':'none';
  // Parcelado e recorrente são mutuamente exclusivos
  if(parc==='sim'){document.getElementById('pgRecorr').value='nao';document.getElementById('recorrDiasField').style.display='none';}
  if(recorr!=='nao'){document.getElementById('pgParc').value='nao';document.getElementById('parcFields').style.display='none';}
}

function addMonths(dateStr,months){
  const d=new Date(dateStr+'T12:00:00');
  d.setMonth(d.getMonth()+months);
  return localDateStr(d);
}
function addDays(dateStr,days){
  const d=new Date(dateStr+'T12:00:00');
  d.setDate(d.getDate()+days);
  return localDateStr(d);
}

function savePagar(id){
  const items=DB.get('pagar');
  const desc=document.getElementById('pgDesc').value;
  const forn=document.getElementById('pgForn').value;
  const tipo=document.getElementById('pgTipo').value;
  const venc=document.getElementById('pgVenc').value;
  const valorTotal=document.getElementById('pgVal').value;
  const parc=document.getElementById('pgParc').value;
  const totalParcelas=parseInt(document.getElementById('pgParcT')?.value)||1;
  const recorr=document.getElementById('pgRecorr').value;
  const recorrDias=document.getElementById('pgRecorrDias')?.value||'';
  const obs=document.getElementById('pgObs').value;

  if(!desc){toast('Preencha a descrição');return;}
  if(!venc){toast('Preencha o vencimento');return;}

  if(id){
    // Editing existing: update only this item
    const i=items.findIndex(x=>x.id===id);
    if(i>=0) items[i]={...items[i],descricao:desc,fornecedor:forn,tipo:tipo,vencimento:venc,valor:valorTotal,parcelado:parc,totalParcelas:String(totalParcelas),recorrente:recorr,recorrDias:recorrDias,obs:obs};
    DB.set('pagar',items);closeModal();rPagar();toast('Atualizado');
    return;
  }

  // New entry: handle parcelas and recurrence
  if(parc==='sim'&&totalParcelas>1){
    // Generate one entry per installment
    const valorParcela=(parseFloat(valorTotal)/totalParcelas).toFixed(2);
    for(let p=1;p<=totalParcelas;p++){
      const parcVenc=addMonths(venc,p-1);
      items.push({id:uid(),descricao:desc+(totalParcelas>1?' ('+p+'/'+totalParcelas+')':''),fornecedor:forn,tipo:tipo,vencimento:parcVenc,valor:valorParcela,parcelado:'sim',parcela:String(p),totalParcelas:String(totalParcelas),recorrente:'nao',recorrDias:'',obs:obs,status:'pendente'});
    }
    DB.set('pagar',items);closeModal();rPagar();toast(totalParcelas+' parcelas geradas');
  } else if(recorr!=='nao'){
    // Generate recurring entries (12 months for mensal, 12 weeks for semanal, or custom)
    let count=12;
    let addFn;
    if(recorr==='mensal'){addFn=(d,i)=>addMonths(d,i);}
    else if(recorr==='semanal'){addFn=(d,i)=>addDays(d,i*7);count=12;}
    else{const dias=parseInt(recorrDias)||30;addFn=(d,i)=>addDays(d,i*dias);count=12;}

    for(let r=0;r<count;r++){
      const recVenc=addFn(venc,r);
      items.push({id:uid(),descricao:desc,fornecedor:forn,tipo:tipo,vencimento:recVenc,valor:valorTotal,parcelado:'nao',parcela:'',totalParcelas:'',recorrente:recorr,recorrDias:recorrDias,obs:obs+(r===0?'':' (recorrência '+(r+1)+'/'+count+')'),status:'pendente'});
    }
    DB.set('pagar',items);closeModal();rPagar();toast(count+' lançamentos recorrentes gerados');
  } else {
    // Single entry
    items.push({id:uid(),descricao:desc,fornecedor:forn,tipo:tipo,vencimento:venc,valor:valorTotal,parcelado:'nao',parcela:'',totalParcelas:'',recorrente:'nao',recorrDias:'',obs:obs,status:'pendente'});
    DB.set('pagar',items);closeModal();rPagar();toast('Cadastrado');
  }
}
function togglePagar(id){const items=DB.get('pagar');const i=items.find(x=>x.id===id);if(i)i.status=i.status==='pago'?'pendente':'pago';DB.set('pagar',items);rPagar();}
function delPagar(id){if(!confirm('Excluir lançamento?'))return;DB.set('pagar',DB.get('pagar').filter(x=>x.id!==id));rPagar();toast('Excluído');}

function managePagTypes(){

// ========== FINANCEIRO — CALENDÁRIO PAGAMENTO ==========
function rCalPag(){
  const y=S.calFinY,m=S.calFinM;
  const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),dip=new Date(y,m,0).getDate();
  const today=new Date();const todayStr=localDateStr(today);
  const items=DB.get('pagar');

  // Build calendar
  let cal='';
  for(let i=fd-1;i>=0;i--)cal+=`<div class="cal-day other-month">${dip-i}</div>`;
  for(let d=1;d<=dim;d++){
    const dt=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    const hasP=items.some(i=>i.vencimento===dt&&i.status!=='pago');
    cal+=`<div class="cal-day ${isT?'today':''} ${hasP?'has-event':''}" onclick="S._calSelDate='${dt}';rCalPag()">${d}</div>`;
  }
  const rem=(7-(fd+dim)%7)%7;
  for(let i=1;i<=rem;i++)cal+=`<div class="cal-day other-month">${i}</div>`;

  // Selected date or today
  const selDate=S._calSelDate||todayStr;
  const dayItems=items.filter(i=>i.vencimento===selDate);
  const pendDay=dayItems.filter(i=>i.status!=='pago');
  const paidDay=dayItems.filter(i=>i.status==='pago');

  document.getElementById('content').innerHTML=`
    <div class="page-header anim"><div class="page-header-left"><h2>Calendário de Pagamentos</h2><p>Visualize e dê baixa nos pagamentos do dia</p></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="cal-container anim d1">
        <div class="cal-header"><h3>${MO[m]} ${y}</h3><div class="cal-nav"><button onclick="S.calFinM--;if(S.calFinM<0){S.calFinM=11;S.calFinY--;}rCalPag()">${I.chevL}</button><button onclick="S.calFinM++;if(S.calFinM>11){S.calFinM=0;S.calFinY++;}rCalPag()">${I.chevR}</button></div></div>
        <div class="cal-grid">${DA.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}${cal}</div>
        <div style="margin-top:14px;display:flex;gap:14px;font-size:11px;color:var(--text-muted)">
          <div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:50%;background:var(--rosa-antigo)"></div> Pagamento pendente</div>
          <div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:50%;background:var(--carvao)"></div> Hoje</div>
        </div>
      </div>
      <div>
        <div class="card anim d2">
          <div class="card-header"><h3>Pagamentos — ${fmtD(selDate)}</h3><span style="font-size:12px;color:var(--text-muted)">${dayItems.length} lançamento${dayItems.length!==1?'s':''}</span></div>
          <div class="card-body">
            ${dayItems.length===0?'<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px">Nenhum pagamento nesta data</div>':`
              ${pendDay.length>0?`<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--rosa-antigo);font-weight:700;margin-bottom:8px">Pendentes (${pendDay.length})</div>${pendDay.map(i=>`
                <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--radius-sm);background:var(--rose-pale);margin-bottom:6px">
                  <div style="flex:1">
                    <div style="font-weight:700;font-size:13px">${i.descricao}</div>
                    <div style="font-size:11px;color:var(--text-muted)">${i.fornecedor||''} ${i.tipo?'· '+i.tipo:''} ${i.parcelado==='sim'?' · Parcela '+i.parcela+'/'+i.totalParcelas:''}</div>
                  </div>
                  <div style="font-weight:800;font-size:15px;color:var(--carvao)">${fmtR(i.valor)}</div>
                  <button class="btn btn-sm" style="background:var(--oliva);color:#fff;border-radius:var(--radius-full)" onclick="togglePagarCal('${i.id}')">${I.check} Baixa</button>
                  <button class="btn-icon" onclick="delPagarCal('${i.id}')" style="width:30px;height:30px">${I.trash}</button>
                </div>
              `).join('')}`:''}
              ${paidDay.length>0?`<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--oliva);font-weight:700;margin:${pendDay.length>0?'16px':'0'} 0 8px">Pagos (${paidDay.length})</div>${paidDay.map(i=>`
                <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--radius-sm);background:var(--oliva-pale);margin-bottom:6px">
                  <div style="flex:1">
                    <div style="font-weight:700;font-size:13px;text-decoration:line-through;color:var(--text-muted)">${i.descricao}</div>
                    <div style="font-size:11px;color:var(--text-muted)">${i.fornecedor||''} ${i.tipo?'· '+i.tipo:''}</div>
                  </div>
                  <div style="font-weight:800;font-size:15px;color:var(--oliva)">${fmtR(i.valor)}</div>
                  <button class="btn btn-sm" style="background:var(--bg-warm);color:var(--text-muted);border-radius:var(--radius-full)" onclick="togglePagarCal('${i.id}')">Desfazer</button>
                </div>
              `).join('')}`:''}
            `}
          </div>
        </div>
      </div>
    </div>`;
}

function handleIdeiaAttach(e){const f=e.target.files[0];if(!f)return;window._ideiaAttachName=f.name;const r=new FileReader();r.onload=ev=>{

};r.readAsDataURL(f);}

// ========== CRIAÇÃO — DOCUMENTOS ==========
function rDocs(){
  const items=DB.get('mydocs'),folders=DB.get('doc_folders');
  const filtered=S.docFolder==='all'?items:items.filter(i=>i.folder===S.docFolder);
  const totalSize=items.reduce((s,i)=>s+(i.size||0),0);
  document.getElementById('content').innerHTML=`
    <div class="page-header anim"><div class="page-header-left"><h2>Documentos</h2><p>${items.length} arquivo${items.length!==1?'s':''} ${totalSize>0?'· '+formatSize(totalSize):''}</p></div><div class="page-header-actions"><button class="btn btn-secondary btn-sm" onclick="openDocFolderModal()">${I.folder} Pastas</button><button class="btn btn-primary" onclick="uploadDoc()">${I.plus} Enviar Arquivo</button></div></div>
    <div class="folder-bar anim d1"><div class="folder-chip ${S.docFolder==='all'?'active':''}" onclick="S.docFolder='all';rDocs()">Todos <span class="count">${items.length}</span></div>${folders.map(f=>`<div class="folder-chip ${S.docFolder===f.id?'active':''}" onclick="S.docFolder='${f.id}';rDocs()">${f.name} <span class="count">${items.filter(i=>i.folder===f.id).length}</span></div>`).join('')}</div>
    ${filtered.length===0?`<div class="empty-state anim d2"><div class="empty-icon">${I.file}</div><h3>Nenhum documento</h3><p>Envie seus primeiros arquivos</p><button class="btn btn-primary" onclick="uploadDoc()">${I.plus} Enviar Arquivo</button></div>`:`
    <div class="card anim d2"><div class="table-wrapper"><table><thead><tr><th>Arquivo</th><th>Pasta</th><th>Tamanho</th><th>Data</th><th></th></tr></thead><tbody>${filtered.map(d=>{
      const fName=folders.find(f=>f.id===d.folder);
      const isImg=d.fileName&&d.fileName.match(/\.(jpg|jpeg|png|gif|webp)$/i);
      return `<tr>
        <td><div style="display:flex;align-items:center;gap:10px;cursor:pointer" onclick="previewDoc('${d.id}')">${isImg?`<img src="${d.data}" style="width:36px;height:36px;border-radius:6px;object-fit:cover">`:`<span style="width:24px;height:24px;flex-shrink:0;color:var(--text-muted)">${I.file}</span>`} <div><strong>${d.name||d.fileName}</strong><div style="font-size:11px;color:var(--text-muted)">${d.fileName||''}</div></div></div></td>
        <td>${fName?fName.name:'-'}</td>
        <td style="font-size:12px;color:var(--text-muted)">${d.size?formatSize(d.size):'-'}</td>
        <td style="font-size:12px;color:var(--text-muted)">${fmtD(d.date)}</td>
        <td style="text-align:right">
          ${d.data?`<button class="btn-icon" onclick="previewDoc('${d.id}')" title="Visualizar" style="display:inline-flex">${I.eye}</button>`:''}
          <a href="${d.data}" download="${d.fileName}" class="btn-icon" style="display:inline-flex;text-decoration:none;margin-left:4px">${I.download}</a>
          <button class="btn-icon" onclick="editDoc('${d.id}')" style="display:inline-flex;margin-left:4px">${I.edit}</button>
          <button class="btn-icon" onclick="delDoc('${d.id}')" style="display:inline-flex;margin-left:4px">${I.trash}</button>
        </td>
      </tr>`;}).join('')}</tbody></table></div></div>`}`;
}

function formatSize(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}

function uploadDoc(){
  const folders=DB.get('doc_folders');
  openModal('Enviar Arquivo',`
    <div class="form-group"><label class="form-label">Arquivo</label><div class="photo-upload" onclick="document.getElementById('docUpIn').click()" id="docUpPrev" style="height:100px">${I.file}<span>Clique para selecionar arquivo</span><input type="file" id="docUpIn" onchange="handleDocUpload(event)"></div></div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Nome (opcional)</label><input class="form-input" id="docUpName" placeholder="Nome descritivo"></div>
      <div class="form-group"><label class="form-label">Pasta</label><select class="form-select" id="docUpFolder"><option value="">Sem pasta</option>${folders.map(f=>`<option value="${f.id}">${f.name}</option>`).join('')}</select></div>
    </div>
  `,`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveDocUpload()">Salvar</button>`);
}

let _docUpData='',_docUpFileName='',_docUpSize=0;
function handleDocUpload(e){
  const f=e.target.files[0];if(!f)return;
  _docUpFileName=f.name;_docUpSize=f.size;
  const isImg=f.name.match(/\.(jpg|jpeg|png|gif|webp)$/i);
  const r=new FileReader();
  r.onload=ev=>{_docUpData=ev.target.result;document.getElementById('docUpPrev').innerHTML=`<div style="display:flex;align-items:center;gap:10px;padding:10px">${isImg?`<img src="${_docUpData}" style="height:60px;border-radius:6px">`:I.file}<div><strong style="font-size:13px">${f.name}</strong><div style="font-size:11px;color:var(--text-muted)">${formatSize(f.size)}</div></div></div><input type="file" id="docUpIn" onchange="handleDocUpload(event)" style="display:none">`;
  if(!document.getElementById('docUpName').value) document.getElementById('docUpName').value=f.name.replace(/\.[^/.]+$/,'');};
  r.readAsDataURL(f);
}

function saveDocUpload(){
  if(!_docUpData){toast('Selecione um arquivo');return;}
  const items=DB.get('mydocs');
  const doc={id:uid(),name:document.getElementById('docUpName').value||_docUpFileName,fileName:_docUpFileName,folder:document.getElementById('docUpFolder').value||'',data:_docUpData,size:_docUpSize,date:localDateStr()};
  items.push(doc);
  // Save metadata only to localStorage (no base64), full data to Supabase
  const localItems=items.map(d=>({...d,data:d.data&&d.data.length>50000?'':d.data}));
  DB._mem['mydocs']=items; // Keep full data in memory for current session
  try{localStorage.setItem('mundana_mydocs',JSON.stringify(localItems));}catch(e){
    // If still fails, strip all data
    const stripped=items.map(d=>({...d,data:''}));
    try{localStorage.setItem('mundana_mydocs',JSON.stringify(stripped));}catch(e2){}
  }
  DB._syncToSupabase('mydocs',items); // Full data goes to Supabase
  _docUpData='';_docUpFileName='';_docUpSize=0;closeModal();rDocs();toast('Arquivo salvo');
}

function editDoc(id){

  `,`<button class="btn btn-ghost" style="color:var(--rosa-antigo)" onclick="delDoc('${d.id}');closeModal()">Excluir</button><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveDocEdit('${d.id}')">Salvar</button>`);

function previewDoc(id){
  const items=DB.get('mydocs'),d=items.find(x=>x.id===id);if(!d||!d.data)return;
  const fn=d.fileName||'';
  const isImg=fn.match(/\.(jpg|jpeg|png|gif|webp|svg)$/i);
  const isPdf=fn.match(/\.pdf$/i);
  let content='';

    content=`<div style="text-align:center;max-height:70vh;overflow:auto"><img src="${d.data}" style="max-width:100%;border-radius:var(--radius-md)"></div>`;
  }else if(isPdf){
    content=`<iframe src="${d.data}" style="width:100%;height:70vh;border:none;border-radius:var(--radius-md)"></iframe>`;
  }else{
    content=`<div style="text-align:center;padding:40px"><div style="width:48px;height:48px;margin:0 auto 16px;color:var(--text-muted)">${I.file}</div><p style="color:var(--text-muted);margin-bottom:16px">Pré-visualização não disponível para este tipo de arquivo</p><a href="${d.data}" download="${fn}" class="btn btn-primary" style="text-decoration:none">${I.download} Baixar arquivo</a></div>`;
  }
  openModal(d.name||fn,content,'<a href="'+d.data+'" download="'+fn+'" class="btn btn-secondary" style="text-decoration:none;margin-right:auto">'+I.download+' Baixar</a><button class="btn btn-secondary" onclick="closeModal()">Fechar</button>',true);

// ========== ROTEIROS DE ATENDIMENTO ==========

function getRotTipos(){return DB.get('rot_tipos').length?DB.get('rot_tipos'):['Follow-up','Venda'];}
function getRotFreqs(){return DB.get('rot_freqs').length?DB.get('rot_freqs'):['1 dia','2 dias','3 dias','4 dias','5 dias','6 dias','7 dias','8 dias','9 dias','10 dias'];}

function rRoteiros(){
  const items=DB.get('roteiros');

    if(S.rotFase!=='all'&&r.fase!==S.rotFase)return false;
    if(S.rotTipo!=='all'&&r.tipo!==S.rotTipo)return false;
    return true;
  });

  const tipoColor=t=>{const map={'Follow-up':'lavanda','Venda':'rosa-antigo'};return map[t]||'lavanda';};

  const tipoBg=t=>{const map={'Follow-up':'var(--lavanda-pale)','Venda':'var(--rose-pale)'};return map[t]||'var(--lavanda-pale)';};

  document.getElementById('content').innerHTML=`
    <div class="page-header anim"><div class="page-header-left"><h2>Roteiro de Atendimento</h2><p>${items.length} mensagen${items.length!==1?'s':''} cadastrada${items.length!==1?'s':''}</p></div><div class="page-header-actions"><button class="btn btn-secondary btn-sm" onclick="manageRotFases()">${I.edit} Fases</button><button class="btn btn-secondary btn-sm" onclick="manageRotTipos()">${I.edit} Tipos</button><button class="btn btn-secondary btn-sm" onclick="manageRotFreqs()">${I.edit} Frequências</button><button class="btn btn-primary" onclick="openRotModal()">${I.plus} Novo Roteiro</button></div></div>

          ${fases.map(f=>`<option value="${f}" ${S.rotFase===f?'selected':''}>${f} (${items.filter(r=>r.fase===f).length})</option>`).join('')}

      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);font-weight:700">Tipo:</span>
        <div class="folder-chip ${S.rotTipo==='all'?'active':''}" onclick="S.rotTipo='all';rRoteiros()">Todos <span class="count">${items.length}</span></div>
        ${tipos.map(t=>`<div class="folder-chip ${S.rotTipo===t?'active':''}" onclick="S.rotTipo='${t}';rRoteiros()">${t} <span class="count">${items.filter(r=>r.tipo===t).length}</span></div>`).join('')}
      </div>
    </div>

      <div style="position:absolute;left:13px;top:14px;bottom:14px;width:2px;background:var(--border);border-radius:1px"></div>

            <div style="padding:16px 20px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

                  ${r.fase?`<span style="background:${faseBg(r.fase)};color:var(--${faseColor(r.fase)});font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600">${r.fase}</span>`:''}

  openModal(id?'Editar Roteiro':'Novo Roteiro',`
    <div class="form-row" style="grid-template-columns:1fr 1fr 1fr">
      <div class="form-group"><label class="form-label">Fase</label><select class="form-select" id="rotFase"><option value="">Selecione...</option>${fases.map(f=>`<option value="${f}" ${r.fase===f?'selected':''}>${f}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Tipo de Contato</label><select class="form-select" id="rotTipo"><option value="">Selecione...</option>${tipos.map(t=>`<option value="${t}" ${r.tipo===t?'selected':''}>${t}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Frequência</label><select class="form-select" id="rotFreq"><option value="">Selecione...</option>${freqs.map(f=>`<option value="${f}" ${r.frequencia===f?'selected':''}>${f}</option>`).join('')}</select></div>

    <div class="form-group"><label class="form-label">Ordem</label><input class="form-input" id="rotOrdem" type="number" value="${r.ordem||items.length+1}" style="max-width:100px" min="1"></div>
  `,`${id?`<button class="btn btn-ghost" style="color:var(--rosa-antigo)" onclick="delRot('${r.id}');closeModal()">Excluir</button>`:''}<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveRot('${r.id||''}')">Salvar</button>`);
}

function saveRot(id){
  const items=DB.get('roteiros');
  const d={id:id||uid(),mensagem:document.getElementById('rotMsg').value,fase:document.getElementById('rotFase').value,tipo:document.getElementById('rotTipo').value,frequencia:document.getElementById('rotFreq').value,ordem:parseInt(document.getElementById('rotOrdem').value)||items.length+1};
  if(!d.mensagem){toast('Preencha a mensagem');return;}
  if(id){const i=items.findIndex(x=>x.id===id);if(i>=0)items[i]=d;}else items.push(d);
  items.sort((a,b)=>(a.ordem||0)-(b.ordem||0));
  DB.set('roteiros',items);closeModal();rRoteiros();toast(id?'Roteiro atualizado':'Roteiro cadastrado');
}

function delRot(id){if(!confirm('Excluir este roteiro?'))return;DB.set('roteiros',DB.get('roteiros').filter(x=>x.id!==id));rRoteiros();toast('Roteiro excluído');}

function addRotFase(){const n=document.getElementById('newRotFase').value;if(!n)return;const f=getRotFases();f.push(n);DB.set('rot_fases',f);manageRotFases();toast('Fase adicionada');}
function updRotFase(i,v){const f=getRotFases();f[i]=v;DB.set('rot_fases',f);}
function delRotFase(i){if(!confirm('Excluir esta fase?'))return;const f=getRotFases();f.splice(i,1);DB.set('rot_fases',f);manageRotFases();toast('Fase excluída');}

function manageRotTipos(){
  const tipos=getRotTipos();
  openModal('Gerenciar Tipos de Contato',`
    <div id="rotTiposList">${tipos.map((t,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><input class="form-input" value="${t}" data-idx="${i}" onchange="updRotTipo(${i},this.value)" style="flex:1"><button class="remove-btn" onclick="delRotTipo(${i})">${I.trash}</button></div>`).join('')}</div>
    <div style="display:flex;gap:8px;margin-top:14px"><input class="form-input" id="newRotTipo" placeholder="Novo tipo" style="flex:1"><button class="btn btn-primary btn-sm" onclick="addRotTipo()">Criar</button></div>
  `,'<button class="btn btn-secondary" onclick="closeModal()">Fechar</button>');
}
function addRotTipo(){const n=document.getElementById('newRotTipo').value;if(!n)return;const t=getRotTipos();t.push(n);DB.set('rot_tipos',t);manageRotTipos();toast('Tipo adicionado');}
function updRotTipo(i,v){const t=getRotTipos();t[i]=v;DB.set('rot_tipos',t);}
function delRotTipo(i){if(!confirm('Excluir este tipo?'))return;const t=getRotTipos();t.splice(i,1);DB.set('rot_tipos',t);manageRotTipos();toast('Tipo excluído');}

function manageRotFreqs(){
  const freqs=getRotFreqs();
  openModal('Gerenciar Frequências',`

    <div style="display:flex;gap:8px;margin-top:14px"><input class="form-input" id="newRotFreq" placeholder="Ex: 15 dias" style="flex:1"><button class="btn btn-primary btn-sm" onclick="addRotFreq()">Criar</button></div>
  `,'<button class="btn btn-secondary" onclick="closeModal()">Fechar</button>');
}
function addRotFreq(){const n=document.getElementById('newRotFreq').value;if(!n)return;const f=getRotFreqs();f.push(n);DB.set('rot_freqs',f);manageRotFreqs();toast('Frequência adicionada');}
function updRotFreq(i,v){const f=getRotFreqs();f[i]=v;DB.set('rot_freqs',f);}
function delRotFreq(i){if(!confirm('Excluir?'))return;const f=getRotFreqs();f.splice(i,1);DB.set('rot_freqs',f);manageRotFreqs();toast('Frequência excluída');}

// ========== INIT ==========
// Cleanup: strip base64 from mydocs in localStorage to free space
try{
  const rawDocs=localStorage.getItem('mundana_mydocs');
  if(rawDocs&&rawDocs.length>500000){
    const docs=JSON.parse(rawDocs);
    const stripped=docs.map(d=>({...d,data:d.data&&d.data.length>50000?'':d.data}));
    localStorage.setItem('mundana_mydocs',JSON.stringify(stripped));
    console.log('Cleaned mydocs localStorage: freed '+(rawDocs.length-JSON.stringify(stripped).length)+' chars');
  }
}catch(e){}
renderNav();
render();
// Load from Supabase in background (will re-render when done)
loadFromSupabase();
</script>
