<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Calendar">
<meta name="theme-color" content="#faf9f7">
<title>My Calendar</title>
<link rel="manifest" id="manifestLink">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;--bg2:#f5f3ef;--bg3:#efefec;--bg4:#e8e4de;
  --sidebar:#1a1a1a;
  --border:#e0ddd8;--border2:#d4d0ca;
  --text:#1a1a1a;--text2:#888880;--text3:#aaa89e;--text4:#c8c4be;
  --accent:#C26D64;--accent2:#d4847c;
  --glow:rgba(194,109,100,.1);
  --green:#5c7161;--red:#C26D64;--yellow:#b17a3a;--cyan:#7a9bae;--lavender:#9b8ea8;
  --r:12px;--rs:8px;
  --shadow:0 2px 16px rgba(26,26,26,.08);
  --font:'Montserrat',sans-serif;--font-mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg3);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;overflow:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.app{display:flex;height:100vh;height:100dvh;overflow:hidden}

/* LOGIN */
.login-screen{position:fixed;inset:0;z-index:500;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.login-box{background:var(--bg);border:0.5px solid var(--border);border-radius:20px;padding:44px 40px;text-align:center;max-width:340px;width:90%;box-shadow:var(--shadow)}
.login-logo{font-size:15px;font-weight:600;color:var(--text);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.login-sub{color:var(--text3);font-size:12px;margin-bottom:28px;line-height:1.7;font-weight:300}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 20px;border-radius:var(--r);background:var(--text);border:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;color:#f5f3ef;transition:all .15s;letter-spacing:.2px}
.google-btn:hover{background:#2e2e2e}
.login-note{font-size:10px;color:var(--text4);margin-top:12px;line-height:1.7}

/* LAYOUT */
.main-layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:54px;background:var(--sidebar);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:18px;flex-shrink:0}
.sb-icon-active{width:28px;height:28px;background:rgba(255,255,255,0.12);border-radius:8px;display:flex;align-items:center;justify-content:center;border:0.5px solid rgba(255,255,255,0.2)}
.sb-icon{display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;border-radius:8px;transition:background .1s}
.sb-icon:hover{background:rgba(255,255,255,0.08)}
.sb-divider{width:24px;height:0.5px;background:rgba(255,255,255,0.1)}
.sb-tag{width:9px;height:9px;border-radius:50%;cursor:pointer;transition:transform .1s}
.sb-tag:hover{transform:scale(1.3)}
.sb-avatar{width:28px;height:28px;border-radius:50%;background:#c8c4be;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text);font-weight:600;cursor:pointer;margin-top:auto;overflow:hidden;border:1.5px solid rgba(255,255,255,0.15)}
.sb-avatar img{width:100%;height:100%;object-fit:cover}
.sb-carga{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 6px;background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.14);border-radius:10px;width:40px;cursor:default}
.sb-carga-label{font-size:6px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.5px;text-align:center;line-height:1.3;font-weight:500}
.sb-carga-num{font-size:13px;font-weight:300;color:rgba(255,255,255,0.85)}
.sb-carga-bar{width:22px;height:2px;background:rgba(255,255,255,0.12);border-radius:2px;overflow:hidden}
.sb-carga-fill{height:100%;background:rgba(255,255,255,0.5);border-radius:2px;transition:width .4s}
.sb-carga-status{font-size:6px;color:rgba(255,255,255,0.35);text-align:center}
.sync-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.4);display:inline-block}
.sync-dot.syncing{background:rgba(255,200,100,.6);animation:pulse 1s infinite}
.sync-dot.offline{background:rgba(200,100,100,.6)}

/* CENTER */
.center-col{flex:2.2;display:flex;flex-direction:column;background:var(--bg);border-right:0.5px solid var(--border)}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:8px;padding:9px 16px;border-bottom:0.5px solid var(--border);background:var(--bg2);flex-shrink:0;flex-wrap:wrap}
.logo-text{font-size:11px;font-weight:600;color:var(--text);letter-spacing:1.4px;text-transform:uppercase}
.vsw{display:flex;background:var(--bg4);border:0.5px solid var(--border2);border-radius:9px;overflow:hidden}
.vb{background:none;border:none;padding:4px 11px;font-family:var(--font);font-size:10px;color:var(--text3);cursor:pointer;transition:all .1s;font-weight:400}
.vb.act{background:var(--text);color:#f5f3ef;font-weight:500}
.addb{background:var(--text);border:none;color:#f5f3ef;cursor:pointer;padding:5px 13px;border-radius:9px;font-family:var(--font);font-size:10px;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:4px;letter-spacing:.2px;white-space:nowrap}
.addb:hover{background:#2e2e2e}
.nb{background:var(--bg2);border:0.5px solid var(--border);color:var(--text2);cursor:pointer;padding:4px 7px;border-radius:var(--rs);font-family:var(--font);font-size:10px;transition:all .1s;display:flex;align-items:center;gap:3px}
.nb:hover{border-color:var(--border2);color:var(--text)}
.nb.tod{background:var(--text);border-color:var(--text);color:#f5f3ef;font-weight:500}
.nb.tod:hover{background:#2e2e2e}
.hide-done-btn,.notif-btn,.bulk-sel-btn{background:var(--bg2);border:0.5px solid var(--border);color:var(--text3);cursor:pointer;padding:4px 8px;border-radius:var(--rs);font-family:var(--font);font-size:10px;transition:all .1s;white-space:nowrap}
.hide-done-btn:hover,.notif-btn:hover,.bulk-sel-btn:hover{border-color:var(--border2);color:var(--text2)}
.hide-done-btn.active{background:var(--text);border-color:var(--text);color:#f5f3ef}
.search-wrap{position:relative;display:flex;align-items:center}
.search-inp{background:var(--bg2);border:0.5px solid var(--border);color:var(--text);border-radius:var(--rs);padding:5px 9px 5px 27px;font-family:var(--font);font-size:10px;outline:none;transition:border-color .15s,width .2s;width:120px}
.search-inp:focus{border-color:var(--border2);width:165px}
.search-icon{position:absolute;left:7px;color:var(--text3);pointer-events:none}
.search-results{position:absolute;top:calc(100% + 4px);right:0;width:250px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);z-index:50;max-height:240px;overflow-y:auto;display:none}
.search-results.open{display:block}
.sr-item{padding:8px 12px;cursor:pointer;border-bottom:0.5px solid var(--border);transition:background .1s;display:flex;align-items:center;gap:8px}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--bg2)}
.sr-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sr-title{font-size:11px;font-weight:500}
.sr-date{font-size:9px;color:var(--text3);font-family:var(--font-mono);margin-top:1px}
.sr-empty{padding:14px;text-align:center;color:var(--text3);font-size:11px}

/* BULK BAR */
#bulkBar{display:none;align-items:center;gap:8px;padding:6px 16px;background:var(--bg2);border-bottom:0.5px solid var(--border);flex-wrap:wrap}
#bulkCount{font-size:11px;color:var(--text2);flex:1}
.bulk-act-btn{background:none;border:0.5px solid var(--border);color:var(--text2);cursor:pointer;padding:4px 10px;border-radius:var(--rs);font-size:10px;transition:all .1s;font-family:var(--font)}
.bulk-act-btn:hover{border-color:var(--border2);color:var(--text)}
.bulk-act-btn.danger{color:var(--red)}
.bulk-colors{display:flex;gap:3px}
.bc{width:13px;height:13px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;transition:transform .1s}
.bc:hover{transform:scale(1.2)}
.ec.bulk-selected{outline:2px solid var(--text);outline-offset:2px}
.bulk-chk{width:16px;height:16px;border-radius:3px;border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:8px;background:transparent}
.ec.bulk-selected .bulk-chk{background:var(--text);color:#f5f3ef;border-color:var(--text)}

/* CENTER CONTENT */
.vc{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* DATE HEADER */
.date-header{padding:18px 22px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.date-day-name{font-size:9px;font-weight:500;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.date-num{font-size:52px;font-weight:300;color:var(--text);line-height:1}
.date-month{font-size:13px;color:var(--text3);font-weight:300;margin-left:10px}
.weather-pill{padding:4px 10px;background:var(--bg3);border-radius:20px;font-size:10px;color:var(--text2);border:0.5px solid var(--border);font-weight:400}

/* MINI CAL */
.mini-cal{padding:14px 22px;border-bottom:0.5px solid var(--border);flex-shrink:0;max-height:220px}
.mch{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.mch-label{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase}
.mcn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
.mcn:hover{color:var(--text2)}
.mcg{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mcdl{text-align:center;font-size:8px;color:var(--text4);letter-spacing:.5px;margin-bottom:4px}
.mcd{text-align:center;font-size:10px;padding:3px 1px;border-radius:50%;cursor:pointer;color:var(--text3);transition:background .1s,color .1s;aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative;font-weight:400;width:22px;height:22px}
.mcd:hover{background:var(--bg3);color:var(--text2)}
.mcd.tod{background:var(--text);color:#f5f3ef;font-weight:500}
.mcd.sel{background:var(--bg3);color:var(--text);font-weight:500}
.mcd.om{opacity:.25}
.mcd.he::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:3px;height:3px;background:var(--accent);border-radius:50%}
.mcd.feriado::before{content:'';position:absolute;top:2px;right:1px;width:3px;height:3px;background:var(--yellow);border-radius:50%}

/* TASKS AREA */
.tasks-area{flex:1;overflow-y:auto;padding:14px 22px}
.tasks-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.tasks-title{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase}
.tasks-cnt{background:var(--text);color:#f5f3ef;border-radius:20px;padding:2px 8px;font-size:9px;font-weight:500;margin-left:6px}
.tasks-toggle{font-size:10px;color:var(--text3);cursor:pointer;font-weight:400}
.tasks-toggle:hover{color:var(--text2)}

/* EVENT CARD */
.ec{cursor:pointer;transition:all .15s;position:relative;user-select:none;margin-bottom:0}
.ec:hover{transform:translateX(2px)}
.ec:hover .eab2{opacity:1}
.ec.done .ect{text-decoration:line-through}
.ec.dragging{opacity:.4;cursor:grabbing}
.ec.drag-over{outline:1.5px dashed var(--text);outline-offset:2px;border-radius:12px}
.eab2{background:none;border:none;color:var(--text3);cursor:pointer;width:17px;height:17px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .1s;opacity:0;padding:0}
.eab2:hover{background:rgba(26,26,26,.07);color:var(--text)}
.eab2.del:hover{color:var(--red)}
.ec-subs{margin-top:4px;display:flex;flex-direction:column;gap:2px;padding-left:4px;border-left:0.5px solid var(--border)}
.ec-sub-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text3)}
.ec-sub-chk{width:8px;height:8px;border-radius:2px;border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:6px;flex-shrink:0}
.ec-sub-chk.done{background:var(--green);border-color:var(--green);color:white}
.ec-sub-done{text-decoration:line-through;color:var(--text4)}
.etgs{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.etg{font-size:9px;padding:1px 6px;border-radius:10px;background:rgba(26,26,26,.06);color:var(--text3)}
.adev{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:500;cursor:pointer;white-space:nowrap;border-left:3px solid;background:rgba(26,26,26,.04);color:var(--text2);transition:filter .1s}
.adev:hover{filter:brightness(.95)}
.adev.done{opacity:.4;text-decoration:line-through}
.now-ind{background:var(--text);height:1px;position:relative;margin:5px 0}
.now-ind::before{content:'';position:absolute;left:-3px;top:-2.5px;width:5px;height:5px;border-radius:50%;background:var(--text)}
.ev-link{color:var(--cyan);text-decoration:underline;cursor:pointer;word-break:break-all}
.done-divider{display:flex;align-items:center;gap:8px;padding:6px 0 3px;margin-top:2px}
.done-divider span{font-size:9px;color:var(--text4);font-family:var(--font-mono);letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.done-divider::after{content:'';flex:1;height:0.5px;background:var(--border)}
.adz{padding:6px 22px;border-bottom:0.5px solid var(--border);display:flex;gap:7px;align-items:flex-start;min-height:32px;flex-wrap:wrap;flex-shrink:0}
.adl{font-size:9px;color:var(--text3);font-family:var(--font-mono);padding-top:2px;white-space:nowrap;min-width:38px;letter-spacing:.3px;text-transform:uppercase}

/* WEEK/MONTH */
.wv{flex:1;overflow:auto;display:flex;flex-direction:column}
.wh{display:grid;border-bottom:0.5px solid var(--border);flex-shrink:0;background:var(--bg2)}
.wdh{padding:8px 4px;text-align:center;border-right:0.5px solid var(--border)}
.wdh:last-child{border-right:none}
.wdn{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.wdnum{font-size:16px;font-weight:300;color:var(--text2);cursor:pointer;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;margin:2px auto 0;transition:background .1s}
.wdnum:hover{background:var(--bg3)}
.wdnum.tod{background:var(--text);color:#f5f3ef}
.wb{flex:1;overflow-y:auto}
.wg{display:grid}
.wc{border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);padding:4px 3px;min-height:80px;cursor:pointer;transition:background .1s}
.wc:last-child{border-right:none}
.wc:hover{background:rgba(26,26,26,.02)}
.wc.tc{background:rgba(26,26,26,.025)}
.wce{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:2px solid;font-weight:500;transition:filter .1s;color:var(--text2);background:rgba(26,26,26,.04)}
.wce:hover{filter:brightness(.96)}
.wce.done{opacity:.4;text-decoration:line-through}
.wcm{font-size:9px;color:var(--text3);padding:1px 3px;cursor:pointer}
.wcm:hover{color:var(--text2)}
.mv{flex:1;overflow:auto;display:flex;flex-direction:column}
.mhdr{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:0.5px solid var(--border);background:var(--bg2);flex-shrink:0}
.mdn{text-align:center;font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:7px 0}
.mg{flex:1;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(70px,1fr);overflow-y:auto}
.mc{border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);padding:3px;cursor:pointer;transition:background .1s;min-height:70px}
.mc:nth-child(7n){border-right:none}
.mc:hover{background:rgba(26,26,26,.02)}
.mc.tod{background:rgba(26,26,26,.03)}
.mc.om{opacity:.25}
.mcnm{font-size:11px;font-weight:300;color:var(--text2);width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:2px}
.mc.tod .mcnm{background:var(--text);color:#f5f3ef}
.mce{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:2px solid;cursor:pointer;font-weight:500;color:var(--text2);background:rgba(26,26,26,.04)}
.mce:hover{filter:brightness(.96)}
.mce.done{opacity:.4;text-decoration:line-through}
.mcm{font-size:9px;color:var(--text3);padding:1px 3px;cursor:pointer}
.mcm:hover{color:var(--text2)}
.feriado-badge{font-size:8px;background:rgba(177,122,58,.1);color:var(--yellow);border-radius:3px;padding:1px 4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-weather-pill{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;background:rgba(26,26,26,0.06);border:0.5px solid rgba(26,26,26,0.12);border-radius:20px;font-size:9px;color:var(--text3);font-family:var(--font-mono);margin-left:6px;vertical-align:middle}
.ev-location-pill{display:inline-flex;align-items:center;gap:3px;font-size:9px;color:var(--text3);margin-top:1px}
.ext-toggle{display:flex;align-items:center;gap:8px;padding:6px 0}
.ext-toggle label{font-size:11px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px}
.ext-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.ext-badge.ext{background:rgba(177,122,58,.1);color:var(--yellow);border:0.5px solid rgba(177,122,58,.3)}
.ext-badge.int{background:rgba(26,26,26,.06);color:var(--text3);border:0.5px solid var(--border)}

/* PLANNER */
.planner{flex:1;overflow-y:auto;padding:16px 22px}
.pl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.pl-title{font-size:14px;font-weight:600;color:var(--text);letter-spacing:.5px;text-transform:uppercase}
.pl-add{background:var(--text);border:none;color:#f5f3ef;cursor:pointer;padding:6px 14px;border-radius:var(--r);font-family:var(--font);font-size:10px;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:4px}
.pl-add:hover{background:#2e2e2e}
.pl-lists{display:flex;flex-direction:column;gap:12px}
.pl-list{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;overflow:hidden}
.pl-list-header{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;transition:background .1s;border-bottom:0.5px solid var(--border)}
.pl-list-header:hover{background:var(--bg3)}
.pl-list.collapsed .pl-list-header{border-bottom:none}
.pl-list-color{width:8px;height:2px;border-radius:1px;flex-shrink:0}
.pl-list-name-edit{font-size:12px;font-weight:500;flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);cursor:text;border-bottom:0.5px solid transparent;transition:border-color .15s;text-transform:uppercase;letter-spacing:.5px}
.pl-list-name-edit:focus{border-bottom-color:var(--border2)}
.pl-list-cnt{font-size:9px;color:var(--text3);font-family:var(--font-mono);white-space:nowrap}
.pl-chevron{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 4px;font-size:11px;transition:transform .2s;flex-shrink:0}
.pl-list.collapsed .pl-chevron{transform:rotate(-90deg)}
.pl-list-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:3px;border-radius:3px;opacity:0;transition:opacity .1s;flex-shrink:0}
.pl-list-header:hover .pl-list-del{opacity:1}
.pl-list-del:hover{color:var(--red)}
.pl-list-body{padding:8px 14px 12px}
.pl-list.collapsed .pl-list-body{display:none}
.pl-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border);cursor:grab;user-select:none}
.pl-item:last-child{border-bottom:none}
.pl-item.dragging{opacity:.4;cursor:grabbing}
.pl-item.drag-over{background:var(--bg3);outline:1px dashed var(--border2);border-radius:4px}
.pl-drag-handle{color:var(--text4);font-size:11px;cursor:grab;padding:0 2px;opacity:0}
.pl-item:hover .pl-drag-handle{opacity:1}
.pl-check{width:14px;height:14px;border-radius:3px;border:0.5px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;-webkit-appearance:none;appearance:none;position:relative;transition:all .1s}
.pl-check:checked{background:var(--text);border-color:var(--text)}
.pl-check:checked::after{content:'✓';color:#f5f3ef;font-size:8px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.pl-item-text{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:12px}
.pl-item-text.done{text-decoration:line-through;color:var(--text3)}
.pl-item-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px;opacity:0;transition:opacity .1s;font-size:12px}
.pl-item:hover .pl-item-del{opacity:1}
.pl-item-del:hover{color:var(--red)}
.pl-add-item{display:flex;align-items:center;gap:7px;padding:7px 0 3px;margin-top:3px}
.pl-new-inp{flex:1;background:var(--bg3);border:0.5px solid var(--border);color:var(--text);border-radius:var(--rs);padding:5px 9px;font-family:var(--font);font-size:11px;outline:none;transition:border-color .15s}
.pl-new-inp:focus{border-color:var(--border2)}
.pl-new-btn{background:var(--text);border:none;color:#f5f3ef;cursor:pointer;padding:5px 12px;border-radius:var(--rs);font-family:var(--font);font-size:10px;font-weight:500;white-space:nowrap}
.pl-new-btn:hover{background:#2e2e2e}
.pl-notes{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--rs);padding:6px 9px;font-family:var(--font);font-size:11px;color:var(--text2);outline:none;resize:vertical;min-height:42px;line-height:1.6;transition:border-color .15s;margin-top:8px}
.pl-notes:focus{border-color:var(--border2)}
.pl-notes::placeholder{color:var(--text4)}
.pl-empty{text-align:center;padding:28px;color:var(--text3);font-size:12px}

/* STICKY */
.sticky-wrap{position:fixed;inset:0;pointer-events:none;z-index:90}
.sticky{position:absolute;width:188px;min-height:110px;border-radius:10px;padding:9px 11px 11px;box-shadow:1px 2px 10px rgba(26,26,26,.15);cursor:move;pointer-events:all;display:flex;flex-direction:column;gap:5px}
.sticky-header{display:flex;align-items:center;justify-content:space-between}
.sticky-colors{display:flex;gap:3px}
.sticky-clr{width:11px;height:11px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;transition:transform .1s}
.sticky-clr:hover{transform:scale(1.2)}
.sticky-clr.active{border-color:rgba(0,0,0,.3)}
.sticky-del{background:none;border:none;cursor:pointer;color:rgba(0,0,0,.3);font-size:14px;line-height:1;padding:0}
.sticky-del:hover{color:rgba(0,0,0,.6)}
.sticky-body{flex:1;background:none;border:none;outline:none;font-family:var(--font);font-size:11px;color:rgba(0,0,0,.7);resize:none;min-height:60px;line-height:1.55}
.sticky-body::placeholder{color:rgba(0,0,0,.28)}
.sticky-add-btn{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg2);border:0.5px solid var(--border2);color:var(--text2);cursor:pointer;padding:6px 16px;border-radius:20px;font-family:var(--font);font-size:11px;font-weight:500;box-shadow:var(--shadow);transition:all .15s;z-index:91;display:none}
.sticky-add-btn:hover{background:var(--bg3);color:var(--text)}

/* RIGHT PANEL */
.right-panel{flex:1;display:flex;flex-direction:column;background:var(--bg3);overflow-y:auto}

/* MODALS */
.mo{position:fixed;inset:0;z-index:100;background:rgba(26,26,26,.5);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;padding:14px}
.mo.open{opacity:1;pointer-events:all}
.modal{background:var(--bg);border:0.5px solid var(--border);border-radius:16px;width:510px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(26,26,26,.12);transform:translateY(10px);transition:transform .2s}
.mo.open .modal{transform:translateY(0)}
.mhd{padding:18px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.mti{flex:1;background:none;border:none;outline:none;font-size:17px;font-weight:300;color:var(--text);font-family:var(--font);letter-spacing:.2px}
.mti::placeholder{color:var(--text4)}
.mcl{background:var(--bg3);border:0.5px solid var(--border);color:var(--text2);cursor:pointer;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .1s;flex-shrink:0}
.mcl:hover{background:var(--bg4);color:var(--text)}
.mb{padding:12px 20px 20px;display:flex;flex-direction:column;gap:11px}
.fr{display:flex;gap:8px;align-items:flex-start}
.fi{width:16px;flex-shrink:0;color:var(--text3);margin-top:9px}
.fc{flex:1}
.fl{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;display:block;font-weight:600;font-family:var(--font-mono)}
.inp,.sel,.ta{width:100%;background:var(--bg3);border:0.5px solid var(--border);color:var(--text);border-radius:var(--rs);padding:6px 9px;font-family:var(--font);font-size:11px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--border2)}
.ta{resize:vertical;min-height:48px;line-height:1.55}
.sel option{background:var(--bg)}
.cr{display:flex;gap:5px;flex-wrap:wrap}
.csw{width:18px;height:18px;border-radius:50%;cursor:pointer;transition:transform .1s;border:2px solid transparent}
.csw:hover{transform:scale(1.15)}
.csw.sel2{border-color:var(--text);transform:scale(1.1)}
.tw{display:flex;flex-wrap:wrap;gap:4px;align-items:center;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--rs);padding:4px 9px;cursor:text;min-height:30px;transition:border-color .15s}
.tw:focus-within{border-color:var(--border2)}
.tch{display:flex;align-items:center;gap:3px;padding:1px 6px;border-radius:20px;font-size:10px;font-weight:500;color:white}
.tcr{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;padding:0;font-size:11px;line-height:1}
.tcr:hover{color:white}
.tti{flex:1;min-width:55px;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:11px}
.tti::placeholder{color:var(--text3)}
.stl{display:flex;flex-direction:column;gap:3px}
.sti{display:flex;align-items:center;gap:6px;padding:3px 0}
.stc{width:13px;height:13px;border-radius:3px;border:0.5px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;-webkit-appearance:none;appearance:none;position:relative;transition:all .1s}
.stc:checked{background:var(--text);border-color:var(--text)}
.stc:checked::after{content:'✓';color:#f5f3ef;font-size:7px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.stt{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:11px;border-bottom:0.5px solid transparent;transition:border-color .1s}
.stt:focus{border-bottom-color:var(--border)}
.stt.dt{text-decoration:line-through;color:var(--text3)}
.str{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px;opacity:0}
.sti:hover .str{opacity:1}
.str:hover{color:var(--red)}
.asb{display:flex;align-items:center;gap:4px;background:none;border:0.5px dashed var(--border);color:var(--text3);cursor:pointer;padding:4px 9px;border-radius:var(--rs);font-family:var(--font);font-size:10px;transition:all .15s;margin-top:2px}
.asb:hover{border-color:var(--border2);color:var(--text2)}
.et{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--rs);padding:4px 8px;cursor:pointer;font-size:14px;transition:all .15s;min-width:32px;text-align:center}
.et:hover{border-color:var(--border2)}
.et.no-emoji{font-size:10px;color:var(--text3)}
.epw{display:none;position:absolute;z-index:200;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:9px;box-shadow:var(--shadow);max-height:200px;overflow-y:auto}
.epw.open{display:block}
.ep-cats{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:7px;border-bottom:0.5px solid var(--border);padding-bottom:5px}
.ep-cat{background:none;border:none;font-size:13px;cursor:pointer;padding:2px 4px;border-radius:3px;transition:background .1s}
.ep-cat:hover,.ep-cat.act{background:var(--bg3)}
.ep-no-emoji{background:none;border:0.5px solid var(--border);color:var(--text3);cursor:pointer;padding:3px 7px;border-radius:3px;font-size:10px;font-family:var(--font);transition:all .1s;margin-bottom:4px;width:100%}
.ep-no-emoji:hover{background:var(--bg2);color:var(--text2)}
.epg{display:grid;grid-template-columns:repeat(9,1fr);gap:2px;max-width:250px}
.epb{background:none;border:none;font-size:16px;cursor:pointer;padding:2px;border-radius:3px;transition:background .1s}
.epb:hover{background:var(--bg3)}
.day-pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.day-pill{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border);background:var(--bg2);color:var(--text3);cursor:pointer;font-size:9px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all .1s;font-family:var(--font-mono)}
.day-pill:hover{border-color:var(--border2);color:var(--text2)}
.day-pill.sel{background:var(--text);border-color:var(--text);color:#f5f3ef}
.month-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:6px;max-width:240px}
.month-day-pill{width:24px;height:24px;border-radius:50%;border:0.5px solid var(--border);background:var(--bg2);color:var(--text3);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;transition:all .1s;font-family:var(--font-mono)}
.month-day-pill:hover{border-color:var(--border2);color:var(--text2)}
.month-day-pill.sel{background:var(--text);border-color:var(--text);color:#f5f3ef}
.ro{display:flex;gap:4px;flex-wrap:wrap}
.ropt{padding:3px 9px;border-radius:20px;font-size:10px;border:0.5px solid var(--border);background:var(--bg2);color:var(--text3);cursor:pointer;transition:all .1s}
.ropt:hover{border-color:var(--border2);color:var(--text2)}
.ropt.act{background:var(--text);border-color:var(--text);color:#f5f3ef}
.aa{border:0.5px dashed var(--border);border-radius:var(--r);padding:10px;text-align:center;cursor:pointer;transition:all .15s;color:var(--text3);font-size:10px}
.aa:hover{border-color:var(--border2);background:var(--bg2);color:var(--text2)}
.al{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.ai{display:flex;align-items:center;gap:5px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rs);padding:3px 7px;font-size:10px;color:var(--text2)}
.ar{background:none;border:none;color:var(--text3);cursor:pointer;padding:0;font-size:10px}
.ar:hover{color:var(--red)}
.mdiv{height:0.5px;background:var(--border)}
.mf{display:flex;justify-content:flex-end;gap:6px;padding:12px 20px;flex-wrap:wrap}
.bg-btn{background:none;border:0.5px solid var(--border);color:var(--text2);cursor:pointer;padding:6px 12px;border-radius:var(--r);font-family:var(--font);font-size:11px;transition:all .1s}
.bg-btn:hover{border-color:var(--border2);color:var(--text)}
.bdel{background:rgba(194,109,100,.07);border:0.5px solid rgba(194,109,100,.25);color:var(--red);cursor:pointer;padding:6px 12px;border-radius:var(--r);font-family:var(--font);font-size:11px;transition:all .1s}
.bdel:hover{background:rgba(194,109,100,.14)}
.bdup{background:rgba(26,26,26,.05);border:0.5px solid var(--border);color:var(--text2);cursor:pointer;padding:6px 12px;border-radius:var(--r);font-family:var(--font);font-size:11px;transition:all .1s}
.bdup:hover{background:rgba(26,26,26,.09)}
.bp{background:var(--text);border:none;color:#f5f3ef;cursor:pointer;padding:6px 16px;border-radius:var(--r);font-family:var(--font);font-size:11px;font-weight:500;transition:all .1s;letter-spacing:.2px}
.bp:hover{background:#2e2e2e}
.nl-modal{width:310px}
.pop-ov{position:fixed;inset:0;z-index:300;background:rgba(26,26,26,.6);backdrop-filter:blur(7px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;padding:16px}
.pop-ov.show{opacity:1;pointer-events:all}
.pop-box{background:var(--bg);border:0.5px solid var(--border);border-radius:16px;padding:24px 26px;max-width:300px;width:100%;text-align:center;box-shadow:var(--shadow);transform:scale(.93);transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.pop-ov.show .pop-box{transform:scale(1)}
.pi{font-size:34px;margin-bottom:8px}
.pt{font-size:16px;font-weight:300;margin-bottom:4px;color:var(--text)}
.pm{font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:5px}
.ptm{font-family:var(--font-mono);font-size:10px;color:var(--text3);margin-bottom:12px}
.pb{background:var(--text);border:none;color:#f5f3ef;cursor:pointer;padding:7px 18px;border-radius:var(--r);font-family:var(--font);font-size:11px;font-weight:500}
.pb:hover{background:#2e2e2e}
@keyframes ring{0%,100%{transform:rotate(0)}20%{transform:rotate(-12deg)}40%{transform:rotate(12deg)}60%{transform:rotate(-8deg)}80%{transform:rotate(8deg)}}
.ring{animation:ring .6s ease}
.toast{position:fixed;bottom:14px;right:14px;z-index:999;background:var(--text);border-radius:var(--r);padding:8px 13px;box-shadow:var(--shadow);font-size:11px;color:#f5f3ef;display:flex;align-items:center;gap:7px;transform:translateY(60px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;letter-spacing:.2px}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:768px){.right-panel{display:none}.center-col{flex:1}}
@media(max-width:500px){.sidebar{display:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">My Calendar</div>
    <div class="login-sub">Sua agenda pessoal, sincronizada em todos os dispositivos</div>
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg width="17" height="17" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Entrar com Google
    </button>
    <div class="login-note">🔒 Dados salvos na sua conta Google</div>
  </div>
</div>

<div class="app" id="mainApp" style="display:none">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sb-icon-active">
    <svg width="13" height="11" viewBox="0 0 13 11" fill="none"><rect x=".5" y=".5" width="12" height="10" rx="2" stroke="white" stroke-width="1"/><path d="M.5 4.5h12" stroke="white" stroke-width="1"/></svg>
  </div>
  <div class="sb-icon" onclick="sw('planner',document.getElementById('nav-planner'))" title="Planner">
    <svg width="15" height="15" viewBox="0 0 14 14" fill="none"><path d="M2 3h10M2 6h7M2 9h8M2 12h5" stroke="rgba(255,255,255,0.5)" stroke-width="1.3" stroke-linecap="round"/></svg>
  </div>
  <div class="sb-icon" onclick="sw('sticky',document.getElementById('nav-sticky'))" title="Notas">
    <svg width="15" height="15" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="rgba(255,255,255,0.5)" stroke-width="1.3"/><path d="M4 5h6M4 8h4" stroke="rgba(255,255,255,0.5)" stroke-width="1.3" stroke-linecap="round"/></svg>
  </div>
  <div class="sb-icon" onclick="toggleSB()" title="Tags">
    <svg width="15" height="15" viewBox="0 0 14 14" fill="none"><path d="M8 1L13 6l-5.5 7L1 7l3.5-6" stroke="rgba(255,255,255,0.5)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="sb-divider"></div>
  <div class="sb-tag" id="sbTag0" style="background:rgba(255,255,255,0.5)" title="Tag 1"></div>
  <div class="sb-tag" id="sbTag1" style="background:rgba(255,255,255,0.35)" title="Tag 2"></div>
  <div class="sb-tag" id="sbTag2" style="background:rgba(255,255,255,0.2)" title="Tag 3"></div>
  <div class="sb-tag" id="sbTag3" style="background:rgba(255,255,255,0.12)" title="Tag 4"></div>
  <div class="sb-divider"></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
    <span class="sync-dot" id="syncDot"></span>
  </div>
  <div class="sb-avatar" id="sbAvatar" onclick="doSignOut()">
    <img id="userAvatar" src="" alt="" style="display:none"/>
    <span id="userInitial">A</span>
  </div>
</div>

<div class="main-layout">

<!-- CENTER -->
<div class="center-col">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo-text">My Calendar</div>
    <div style="flex:1"></div>
    <div id="weatherWidget" style="display:none;align-items:center;gap:4px;padding:3px 8px;background:var(--bg3);border:0.5px solid var(--border);border-radius:20px;font-size:10px;color:var(--text2)"></div>
    <div class="search-wrap">
      <svg class="search-icon" width="11" height="11" viewBox="0 0 13 13" fill="none"><circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.2"/><path d="M9 9l2.5 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <input class="search-inp" id="searchInp" placeholder="Buscar..." oninput="doSearch(this.value)" onblur="setTimeout(()=>closeSearch(),200)"/>
      <div class="search-results" id="searchRes"></div>
    </div>
    <div style="display:flex;gap:3px">
      <button class="nb" onclick="nav(-1)" id="navPrev"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M8 1.5L3.5 6 8 10.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>
      <button class="nb tod" onclick="goToday()">Hoje</button>
      <button class="nb" onclick="nav(1)" id="navNext"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M4 1.5L8.5 6 4 10.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>
    </div>
    <div class="vsw">
      <button class="vb act" id="vb-day" onclick="sw('day',null)">Dia</button>
      <button class="vb" id="vb-week" onclick="sw('week',null)">Sem.</button>
      <button class="vb" id="vb-month" onclick="sw('month',null)">Mês</button>
      <button class="vb" id="vb-planner" onclick="sw('planner',null)">Planner</button>
      <button class="vb" id="vb-sticky" onclick="sw('sticky',null)">Notas</button>
    </div>
    <button class="hide-done-btn" id="hideDoneBtn" onclick="toggleHideDone()">👁 Ocultar</button>
    <button class="notif-btn" onclick="requestPushPermission()" title="Notificações">🔔</button>
    <button class="bulk-sel-btn" id="bulkBtn" onclick="toggleBulkMode()">⊡ Sel.</button>
    <button class="addb" id="addBtn" onclick="handleAdd()">
      <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Novo
    </button>
  </div>

  <!-- BULK BAR -->
  <div id="bulkBar">

<script>
function gEl(id){return document.getElementById(id);}
function setSafe(id,prop,val){const el=gEl(id);if(el)el[prop]=val;}
function setStyleSafe(id,prop,val){const el=gEl(id);if(el)el.style[prop]=val;}


// ── WEATHER ──────────────────────────────────────────────
let weatherCache = {};
async function fetchWeather(ds) {
  if (weatherCache[ds]) return weatherCache[ds];
  try {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=-22.9068&longitude=-43.1729&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=America%2FSao_Paulo&start_date=${ds}&end_date=${ds}`);
    const data = await res.json();
    if (!data.daily || !data.daily.weathercode) return null;
    const code = data.daily.weathercode[0];
    const max = Math.round(data.daily.temperature_2m_max[0]);
    const min = Math.round(data.daily.temperature_2m_min[0]);
    const icons = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',77:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',85:'🌨️',86:'❄️',95:'⛈️',96:'⛈️',99:'⛈️'};
    const icon = icons[code] || '🌡️';
    const result = { icon, max, min, code };
    weatherCache[ds] = result;
    return result;
  } catch(e) { return null; }
}

async function renderWeather(ds) {
  const el = document.getElementById('weatherWidget');
  if (!el) return;
  el.textContent = '...';
  const w = await fetchWeather(ds);
  if (!w) { el.style.display='none'; return; }
  el.style.display='flex';
  el.innerHTML = `<span style="font-size:18px">${w.icon}</span><span style="font-size:12px;color:var(--text2)">${w.max}° <span style="color:var(--text3)">${w.min}°</span></span>`;
}

// ── DAY LOAD INDICATOR ────────────────────────────────────
function getDayLoad(ds) {
  const evList = getEvs(ds).filter(e => !e.allDay && !e.done);
  if (!evList.length) return { level: 'free', label: 'Dia livre', pct: 0 };
  let totalMins = 0;
  evList.forEach(ev => {
    if (ev.startTime && ev.endTime) {
      const [sh, sm] = ev.startTime.split(':').map(Number);
      const [eh2, em] = ev.endTime.split(':').map(Number);
      totalMins += (eh2 * 60 + em) - (sh * 60 + sm);
    } else { totalMins += 60; }
  });
  const workMins = 8 * 60;
  const pct = Math.min(100, Math.round((totalMins / workMins) * 100));
  let level, label;
  if (pct <= 30) { level = 'light'; label = 'Dia tranquilo'; }
  else if (pct <= 65) { level = 'balanced'; label = 'Equilibrado'; }
  else if (pct <= 90) { level = 'busy'; label = 'Dia cheio'; }
  else { level = 'overload'; label = 'Sobrecarregado'; }
  return { level, label, pct, totalMins };
}

function renderDayLoad(ds) {
  const el = document.getElementById('dayLoadWidget');
  if (!el) return;
  const load = getDayLoad(ds);
  const colors = { free: 'var(--green)', light: 'var(--green)', balanced: 'var(--accent)', busy: 'var(--yellow)', overload: 'var(--red)' };
  const col = colors[load.level];
  const h = Math.floor(load.totalMins / 60), m = load.totalMins % 60;
  const timeStr = load.totalMins > 0 ? ` · ${h > 0 ? h + 'h' : ''}${m > 0 ? m + 'm' : ''}` : '';
  el.innerHTML = `<div style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0"></div><span style="font-size:11px;color:var(--text2)">${load.label}${timeStr}</span>`;
}

  if (bar) bar.style.display = bulkMode ? 'flex' : 'none';

function toggleSelectEv(id, e) {

let pushEnabled = false;

async function requestPushPermission() {
  if (!('Notification' in window)) { showToast('Navegador não suporta notificações'); return false; }
  if (Notification.permission === 'granted') { pushEnabled = true; registerSW(); return true; }
  if (Notification.permission === 'denied') { showToast('Notificações bloqueadas no navegador'); return false; }
  const perm = await Notification.requestPermission();
  pushEnabled = perm === 'granted';
  if (pushEnabled) { registerSW(); showToast('🔔 Notificações ativadas!'); }
  else { showToast('Notificações não autorizadas'); }
  return pushEnabled;
}

function registerSW() {
  // Blob SW not supported on GitHub Pages — use Notification API directly
  pushEnabled = ('Notification' in window && Notification.permission === 'granted');
}

function schedPushNotif(ev, mins) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const edt = new Date(ev.date + 'T' + ev.startTime + ':00');
  const nt = new Date(edt.getTime() - mins * 60000);
  const delay = nt - new Date();
  if (delay < 0) return;
  const title = (ev.emoji && ev.emoji !== 'none' ? ev.emoji + ' ' : '') + ev.title;
  const doNotif = (body) => {
    setTimeout(() => {
      try { new Notification(title, { body, icon: '', tag: ev.id }); } catch(e) {}
    }, delay);
  };
  if (ev.isExternal && ev.location && ev.date && ev.startTime) {
    fetchActivityWeather(ev.location, ev.date, ev.startTime).then(w => {
      let body = mins === 0 ? 'Comecando agora!' : 'Comeca em ' + mins + ' minuto' + (mins !== 1 ? 's' : '');
      if (w) {
        body += ' · ' + w.icon + ' ' + w.temp + '°C em ' + w.geo;
        if (w.precip > 50) body += ' · 🌂 Chuva ' + w.precip + '%';
      }
      doNotif(body);
    });
  } else {
    const body = mins === 0 ? 'Comecando agora!' : 'Comeca em ' + mins + ' minuto' + (mins !== 1 ? 's' : '');
    doNotif(body);
  }
}

function getFeriado(ds){
  const [yr,mo,dy]=ds.split('-');
  const fixed=FERIADOS.fixed.find(f=>f[0]===mo&&f[1]===dy);
  if(fixed)return fixed[2];
  // Pascoa (algoritmo de Gauss)
  const y=parseInt(yr),a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;
  const easter=new Date(y,month-1,day);
  const checks=[[-2,'Sexta Santa'],[-47,'Carnaval (2a)'],[-48,'Carnaval'],[-49,'Carnaval (dom)'],[-3,'Quinta Santa'],[60,'Corpus Christi'],[39,'Ascensao']];
  for(const[off,name]of checks){const t=new Date(easter);t.setDate(t.getDate()+off);if(tds(t)===ds)return name;}
  return null;
}

function getEvs(ds){
  const res=[];
  evs.forEach(ev=>{
    if(ev.date===ds){res.push(ev);return;}
    if(!ev.repeat||ev.repeat==='none')return;
    if(ev.deletedExceptions&&ev.deletedExceptions.includes(ds))return;
    const ed=new Date(ev.date+'T00:00:00'),cd2=new Date(ds+'T00:00:00');
    if(cd2<=ed)return;
    const diff=Math.round((cd2-ed)/86400000),dow=cd2.getDay();
    if(ev.repeat==='daily')res.push({...ev,date:ds,_instanceDate:ds,done:((ev.doneExceptions||{})[ds]||false)});
    else if(ev.repeat==='weekly'){const days=ev.repeatDays&&ev.repeatDays.length?ev.repeatDays:null;if(days){if(days.includes(dow))res.push({...ev,date:ds,_instanceDate:ds,done:((ev.doneExceptions||{})[ds]||false)});}else if(diff%7===0)res.push({...ev,date:ds,_instanceDate:ds,done:((ev.doneExceptions||{})[ds]||false)});}
    else if(ev.repeat==='monthly'){const days=ev.repeatMonthDays&&ev.repeatMonthDays.length?ev.repeatMonthDays:null;if(days){if(days.includes(cd2.getDate()))res.push({...ev,date:ds,_instanceDate:ds,done:((ev.doneExceptions||{})[ds]||false)});}else if(cd2.getDate()===ed.getDate())res.push({...ev,date:ds,_instanceDate:ds,done:((ev.doneExceptions||{})[ds]||false)});}
    else if(ev.repeat==='custom'){const i=ev.repeatInterval||1,u=ev.repeatUnit||'days';let m=false;if(u==='days'&&diff%i===0&&diff>0)m=true;if(u==='weeks'&&diff%(i*7)===0&&diff>0)m=true;if(u==='months'){const md=(cd2.getFullYear()-ed.getFullYear())*12+cd2.getMonth()-ed.getMonth();if(md>0&&md%i===0&&cd2.getDate()===ed.getDate())m=true;}if(m)res.push({...ev,date:ds,_instanceDate:ds,done:((ev.doneExceptions||{})[ds]||false)});}
  });
  return res;
}

// ── DAY DRAG & DROP ──
function initDayDrag(wrap){
  let dragEl=null,dragId=null;
  wrap.querySelectorAll('.ec[draggable]').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragEl=el;dragId=el.dataset.eid;el.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');wrap.querySelectorAll('.ec').forEach(e=>e.classList.remove('drag-over'));dragEl=null;});
    el.addEventListener('dragover',e=>{e.preventDefault();if(el!==dragEl)el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{
      e.preventDefault();el.classList.remove('drag-over');
      if(!dragId||el.dataset.eid===dragId)return;
      const srcEv=evs.find(ev=>ev.id===dragId);
      const tgtEv=evs.find(ev=>ev.id===el.dataset.eid);
      if(!srcEv||!tgtEv)return;
      // swap times
      const tmpS=srcEv.startTime,tmpE=srcEv.endTime;
      srcEv.startTime=tgtEv.startTime;srcEv.endTime=tgtEv.endTime;
      tgtEv.startTime=tmpS;tgtEv.endTime=tmpE;
      if(window.fbSaveEv){fbSaveEv(srcEv);fbSaveEv(tgtEv);}
      renderView();showToast('Horarios trocados!');
    });
  });
}

// ── PLANNER DRAG ──
function initPlItemDrag(el){
  el.addEventListener('dragstart',e=>{dragLid=el.dataset.lid;dragIdx=parseInt(el.dataset.idx);el.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  el.addEventListener('dragend',()=>{el.classList.remove('dragging');document.querySelectorAll('.pl-item').forEach(e=>e.classList.remove('drag-over'));});
  el.addEventListener('dragover',e=>{e.preventDefault();if(el.dataset.lid===dragLid&&parseInt(el.dataset.idx)!==dragIdx)el.classList.add('drag-over');});
  el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
  el.addEventListener('drop',e=>{
    e.preventDefault();el.classList.remove('drag-over');
    const tgtLid=el.dataset.lid,tgtIdx=parseInt(el.dataset.idx);
    if(dragLid!==tgtLid||dragIdx===tgtIdx)return;
    const lst=lists.find(l=>l.id===dragLid);if(!lst)return;
    const items=lst.items||[];
    const[moved]=items.splice(dragIdx,1);items.splice(tgtIdx,0,moved);
    lst.items=items;if(window.fbSaveLst)fbSaveLst(lst);renderView();
  });
}

function renderStickies(){
  const wrap=document.getElementById('stickyWrap');wrap.innerHTML='';
  (stickies||[]).forEach((s,i)=>wrap.appendChild(mkSticky(s,i)));
}
function mkSticky(s,i){
  const el=document.createElement('div');el.className='sticky';
  el.style.cssText='left:'+(s.x||100+i*30)+'px;top:'+(s.y||100+i*30)+'px;background:'+(s.color||'#fbbf24');
  el.innerHTML='<div class="sticky-header">'+
    '<div class="sticky-colors">'+SCLRS.map(c=>'<div class="sticky-clr '+(c===(s.color||'#fbbf24')?'active':'')+'" style="background:'+c+'" onclick="stickyColor('+i+',\''+c+'\',this)"></div>').join('')+'</div>'+
    '<button class="sticky-del" onclick="delSticky('+i+')">×</button>'+
    '</div>'+
    '<textarea class="sticky-body" placeholder="Escreva aqui..." onchange="updSticky('+i+',this.value)">'+eh(s.text||'')+'</textarea>';
  makeDraggable(el,i);
  return el;
}
function addSticky(){
  const s={id:gid(),text:'',color:'#fbbf24',x:80+Math.random()*200,y:80+Math.random()*150};
  stickies.push(s);if(window.fbSaveStickies)fbSaveStickies();renderStickies();showToast('Nota criada!');}
function delSticky(i){if(!confirm('Excluir esta nota?'))return;stickies.splice(i,1);if(window.fbSaveStickies)fbSaveStickies();renderStickies();}
function updSticky(i,val){if(stickies[i]){stickies[i].text=val;if(window.fbSaveStickies)fbSaveStickies();}}
function stickyColor(i,c,el){if(stickies[i]){stickies[i].color=c;if(window.fbSaveStickies)fbSaveStickies();renderStickies();}}
function makeDraggable(el,idx){
  let sx,sy,ox,oy;
  el.addEventListener('mousedown',e=>{
    if(e.target.tagName==='TEXTAREA'||e.target.tagName==='BUTTON'||e.target.classList.contains('sticky-clr'))return;
    sx=e.clientX;sy=e.clientY;ox=stickies[idx].x;oy=stickies[idx].y;
    el.classList.add('dragging-note');
    function mm(e){const dx=e.clientX-sx,dy=e.clientY-sy;stickies[idx].x=ox+dx;stickies[idx].y=oy+dy;el.style.left=stickies[idx].x+'px';el.style.top=stickies[idx].y+'px';}
    function mu(){el.classList.remove('dragging-note');document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);if(window.fbSaveStickies)fbSaveStickies();}
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });
}

  }cclr=ev.color||CLRS[0];ctags=[...(ev.tags||[])];atts=[...(ev.attachments||[])];sts=JSON.parse(JSON.stringify(ev.subtasks||[]));crep=ev.repeat||'none';

  // day headers
  calHtml+='<div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:9px;color:#c8c4be;margin-bottom:4px;font-family:Montserrat,sans-serif">';

    const prev=new Date(mcd.getFullYear(),mcd.getMonth(),1-f.getDay()+i);
    calHtml+='<div style="padding:4px;color:#d8d4ce;font-size:9px">'+prev.getDate()+'</div>';
  }
  for(let d=1;d<=l.getDate();d++){
    const thisDate=new Date(mcd.getFullYear(),mcd.getMonth(),d);
    const isToday=thisDate.toDateString()===today.toDateString();
    const isSel=thisDate.toDateString()===cd.toDateString();

    const hasEvs=getEvs(ds2).length>0;

    else if(isSel)style+='background:#e8e4de;color:#1a1a1a;font-weight:500;';
    else style+='color:#aaa89e;';

      (hasEvs&&!isToday?'<div style="position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;background:'+(isFer?'#b17a3a':'#aaa89e')+';border-radius:50%"></div>':'')+

async function geocodeLocation(loc){
  try{
    const url='https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(loc)+'&format=json&addressdetails=1&limit=1&accept-language=pt-BR';
    const r=await fetch(url,{headers:{'Accept':'application/json','User-Agent':'MyCalendarApp/1.0'}});
    const d=await r.json();
    if(d&&d.length>0){
      const res=d[0];
      const a=res.address||{};
      const name=(a.road||a.suburb||a.neighbourhood||a.city_district||'')+
        (a.city||a.town||a.village?', '+(a.city||a.town||a.village):'');
      return{lat:parseFloat(res.lat),lon:parseFloat(res.lon),name:name||res.display_name.split(',').slice(0,2).join(',')};
    }
    return null;
  }catch(e){return null;}
}

async function fetchActivityWeather(loc,date,timeStr){
  const key=loc+'|'+date+'|'+timeStr;
  if(_evWeatherCache[key])return _evWeatherCache[key];
  const geo=await geocodeLocation(loc);
  if(!geo)return null;
  try{
    const url='https://api.open-meteo.com/v1/forecast?latitude='+geo.lat+'&longitude='+geo.lon+'&hourly=temperature_2m,weathercode,precipitation_probability&timezone=America%2FSao_Paulo&start_date='+date+'&end_date='+date;
    const r=await fetch(url);const d=await r.json();
    if(!d.hourly||!d.hourly.time)return null;
    const hour=timeStr?parseInt(timeStr.split(':')[0]):12;
    const idx=d.hourly.time.findIndex(t=>parseInt(t.split('T')[1].split(':')[0])===hour);
    const i=idx>=0?idx:0;
    const code=d.hourly.weathercode[i];
    const temp=Math.round(d.hourly.temperature_2m[i]);
    const precip=d.hourly.precipitation_probability[i]||0;
    const icons={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',80:'🌦️',81:'🌧️',95:'⛈️',96:'⛈️',99:'⛈️'};
    const icon=icons[code]||'🌡️';
    const result={icon,temp,precip,geo:geo.name,code};
    _evWeatherCache[key]=result;
    return result;
  }catch(e){return null;}
}

async function fetchWeatherPreview(){
  const loc=document.getElementById('evLocation')&&document.getElementById('evLocation').value.trim();
  const date=document.getElementById('edate')&&document.getElementById('edate').value;
  const time=document.getElementById('estart')&&document.getElementById('estart').value;
  const prev=document.getElementById('evWeatherPreview');
  if(!prev)return;
  if(!loc||!date){prev.style.display='none';return;}
  prev.style.display='flex';
  prev.innerHTML='<span style="color:var(--text3);font-size:10px">🔍 Buscando previsão...</span>';
  const w=await fetchActivityWeather(loc,date,time);
  if(!w){prev.innerHTML='<span style="color:var(--text3);font-size:10px">⚠️ Endereço não encontrado. Tente ser mais específico (ex: Av. Paulista, São Paulo)</span>';return;}
  const rain=w.precip>50?'<span style="color:var(--accent);font-weight:500">🌂 Chance de chuva: '+w.precip+'%</span>':'';
  prev.innerHTML='<span style="font-size:14px">'+w.icon+'</span>'+
    '<span style="font-weight:500;color:var(--text)">'+w.temp+'°C</span>'+
    '<span style="color:var(--text3)">em '+w.geo+'</span>'+
    (rain?rain:'<span style="color:var(--text3)">Chuva: '+w.precip+'%</span>');
}

async function refreshActivityWeather(ev){
  if(!ev.location||!ev.date||!ev.startTime)return null;
  return await fetchActivityWeather(ev.location,ev.date,ev.startTime);
}

function bindELNew(w){
  w.querySelectorAll('[data-eid]').forEach(el=>el.addEventListener('click',e=>{
    if(e.target.closest('[data-chk]')||e.target.closest('[data-dup]')||e.target.closest('[data-dl]')||e.target.tagName==='A')return;
    openEdit(el.dataset.eid,el.dataset.idate);
  }));
  w.querySelectorAll('[data-chk]').forEach(b=>{
    b.addEventListener('mouseup',e=>{if(e.button===0){e.stopPropagation();togDone(b.dataset.chk,b.dataset.idate);}});
  });
  w.querySelectorAll('[data-dup]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();qDup(b.dataset.dup);}));
  w.querySelectorAll('[data-dl]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();qDel(b.dataset.dl,b.dataset.idate);
  }));
}
window.rDay=function(c){
  const ds=tds(cd);
  const de=getEvs(ds);
  const days=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const months=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const today=new Date();const isT=cd.toDateString()===today.toDateString();
  const fer=getFeriado(ds);

  // date header
  const dh=document.createElement('div');dh.className='date-header';
  const dateLeft=document.createElement('div');
  dateLeft.innerHTML='<div class="date-day-name">'+days[cd.getDay()]+(isT?' · Hoje':'')+'</div>'+
    '<div style="display:flex;align-items:baseline"><div class="date-num">'+cd.getDate()+'</div><div class="date-month">'+months[cd.getMonth()]+' · '+cd.getFullYear()+'</div></div>'+
    (fer?'<div style="font-size:10px;color:var(--yellow);margin-top:4px;font-weight:400">🇧🇷 '+fer+'</div>':'');
  const dateRight=document.createElement('div');
  dateRight.style.cssText='display:flex;flex-direction:column;align-items:flex-end;gap:5px;margin-top:6px';
  dateRight.id='weatherInline';
  dh.appendChild(dateLeft);dh.appendChild(dateRight);
  c.appendChild(dh);
  renderWeather(ds).then(()=>{
    const w=weatherCache[ds];
    if(w&&dateRight){dateRight.innerHTML='<div class="weather-pill">'+w.icon+' '+w.max+'° / '+w.min+'°</div>';}
  });

  // mini-cal moved to right panel

  // allday
  const allday=de.filter(e=>e.allDay);
  if(allday.length){
    const az=document.createElement('div');az.className='adz';
    az.innerHTML='<div class="adl">Dia todo</div><div style="display:flex;gap:5px;flex-wrap:wrap">'+allday.map(ev=>adHTML(ev)).join('')+'</div>';
    c.appendChild(az);
  }

  // tasks area
  const ta=document.createElement('div');ta.className='tasks-area';
  const timed=de.filter(e=>!e.allDay);
  const timedNotDone=timed.filter(e=>!e.done).sort((a,b)=>a.startTime.localeCompare(b.startTime));
  const timedDone=timed.filter(e=>e.done).sort((a,b)=>a.startTime.localeCompare(b.startTime));
  const timedAll=hideDone?timedNotDone:[...timedNotDone,...timedDone];

  ta.innerHTML='<div class="tasks-header"><div><span class="tasks-title">Tarefas</span><span class="tasks-cnt">'+(timedAll.length)+'</span></div><span class="tasks-toggle" onclick="toggleHideDone()">'+(hideDone?'👁 Mostrar concluídas':'👁 Ocultar concluídas')+'</span></div>';

  if(!timedAll.length&&!allday.length){
    ta.innerHTML+='<div style="text-align:center;color:var(--text4);padding:28px 0;font-size:11px">Nenhum evento hoje.<br><span style="font-size:10px">Clique em Novo para adicionar.</span></div>';
  } else {
    const now=new Date();const nowM=now.getHours()*60+now.getMinutes();let ni=false;
    let html='<div style="display:flex;flex-direction:column;gap:7px">';
    timedNotDone.forEach(ev=>{
      const evM=parseInt(ev.startTime.split(':')[0])*60+parseInt(ev.startTime.split(':')[1]);
      if(isT&&!ni&&evM>nowM){html+='<div class="now-ind"></div>';ni=true;}
      html+=ecHTMLNew(ev);
    });
    if(isT&&!ni&&timedNotDone.length)html+='<div class="now-ind"></div>';
    if(!hideDone&&timedDone.length){
      html+='<div class="done-divider" style="margin-top:4px"><span>concluídas</span></div>';
      timedDone.forEach(ev=>{html+=ecHTMLNew(ev);});
    }
    html+='</div>';
    ta.innerHTML+=html;
  }
  c.appendChild(ta);
  if(bulkMode)bindBulk(c);else{bindELNew(c);initDayDrag(ta);}
  renderRightPanel();
  updSBCarga();
};
